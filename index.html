// ── MEB Rapor Bileşeni ────────────────────────────────────────────────────────
function MEBRaporEkrani({ records, profiles, riskListesi, sevkler, kayitliListesi }) {
  const [donem, setDonem] = useState("1. Dönem");
  const [yil, setYil] = useState(new Date().getFullYear().toString());
  const [aiRapor, setAiRapor] = useState("");
  const [aiLoading, setAiLoading] = useState(false);

  // İstatistikler
  const toplamGorusme = records.length;
  const ogrenciGorusme = records.filter(r => (r.meetingType||"Öğrenci")==="Öğrenci").length;
  const veliGorusme = records.filter(r => r.meetingType==="Veli").length;
  const benzersizOgrenci = new Set(records.map(r => r.studentName?.toLowerCase().trim())).size;
  const aktifRisk = riskListesi.filter(r => !r.kapandi).length;
  const tamamlananSevk = sevkler.filter(s => !s.sonucBekleniyor).length;
  const bekleyenSevk = sevkler.filter(s => s.sonucBekleniyor).length;

  // Konu dağılımı
  const konular = {};
  records.forEach(r => { const k = r.topic||"Genel"; konular[k] = (konular[k]||0)+1; });
  const topKonular = Object.entries(konular).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Risk türleri
  const riskTurleri = {};
  riskListesi.forEach(r => { riskTurleri[r.riskTuru||"Diğer"] = (riskTurleri[r.riskTuru||"Diğer"]||0)+1; });

  async function handleAiRapor() {
    setAiLoading(true);
    const istatistik = `
Dönem: ${donem} ${yil}
Toplam Görüşme: ${toplamGorusme} (Öğrenci: ${ogrenciGorusme}, Veli: ${veliGorusme})
Görüşülen Öğrenci Sayısı: ${benzersizOgrenci}
Aktif Risk: ${aktifRisk}, Sevk: ${sevkler.length} (Tamamlanan: ${tamamlananSevk}, Bekleyen: ${bekleyenSevk})
Başlıca Görüşme Konuları: ${topKonular.map(([k,v])=>k+": "+v).join(", ")}
Risk Türleri: ${Object.entries(riskTurleri).map(([k,v])=>k+": "+v).join(", ")}
    `.trim();

    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:2000,
        system:"Sen okul PDR danismanisın. MEB formatinda, resmi ve özlü dönem sonu raporu yazarsın.",
        messages:[{role:"user", content:`${istatistik}

Bu istatistiklere dayalı MEB formatında dönem sonu PDR faaliyet raporu yaz. Şu bölümleri içersin:
1. GENEL DEĞERLENDİRME
2. BİREYSEL GÖRÜŞMELER
3. RİSK DEĞERLENDİRMESİ
4. SEVK VE YÖNLENDİRME
5. ÖNERİLER

Resmi dil kullan, Markdown kullanma.`}]
      });
    const data = await res.json();
    setAiRapor(data.content?.[0]?.text || "");
    setAiLoading(false);
  }

  return (
    <div>
      <div style={{background:"#F0F4FF",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#3B4FD8",fontWeight:600}}>
        📑 MEB Dönem Sonu PDR Faaliyet Raporu
      </div>

      {/* Dönem seç */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <select value={donem} onChange={e=>setDonem(e.target.value)} style={{flex:1,padding:"9px 11px",border:`1px solid ${BORDER}`,borderRadius:9,fontSize:13}}>
          <option>1. Dönem</option><option>2. Dönem</option><option>Yıllık</option>
        </select>
        <input value={yil} onChange={e=>setYil(e.target.value)} style={{width:80,padding:"9px",border:`1px solid ${BORDER}`,borderRadius:9,fontSize:13,textAlign:"center"}} />
      </div>

      {/* İstatistik kartları */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          ["Toplam Görüşme",toplamGorusme,ACCENT],
          ["Öğrenci",ogrenciGorusme,BLUE],
          ["Veli",veliGorusme,ORANGE],
          ["Görüşülen Öğrenci",benzersizOgrenci,PURPLE],
          ["Aktif Risk",aktifRisk,"#C0392B"],
          ["Sevk",sevkler.length,"#B07D1A"],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:c}}>{v}</div>
            <div style={{fontSize:10,color:MUTED}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Konu dağılımı */}
      {topKonular.length > 0 && (
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:TEXT,textTransform:"uppercase",marginBottom:8}}>Başlıca Görüşme Konuları</div>
          {topKonular.map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:12,color:TEXT}}>{k}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:60,height:4,background:BORDER,borderRadius:2}}>
                  <div style={{width:`${(v/toplamGorusme)*100}%`,height:"100%",background:ACCENT,borderRadius:2}}/>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:ACCENT,width:20,textAlign:"right"}}>{v}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* AI Rapor */}
      <button onClick={handleAiRapor} disabled={aiLoading} style={{width:"100%",padding:"12px",background:aiLoading?BORDER:ACCENT,color:aiLoading?"#666":"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:12}}>
        {aiLoading?"⏳ MEB raporu hazırlanıyor...":"📑 AI ile MEB Raporu Oluştur"}
      </button>

      {aiRapor && (
        <div>
          <div id="meb-rapor-icerik" style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:16,marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:800,color:TEXT,marginBottom:4}}>PDR Faaliyet Raporu</div>
            <div style={{fontSize:11,color:MUTED,marginBottom:12}}>{donem} {yil} · {new Date().toLocaleDateString("tr-TR")}</div>
            <div style={{fontSize:13,color:TEXT,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{aiRapor}</div>
          </div>
          <button onClick={()=>raporIndir("meb-rapor-icerik","MEB_PDR_Raporu_"+donem.replace(" ","_")+"_"+yil)} style={{width:"100%",padding:"10px",background:BLUE,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            📄 Raporu İndir
          </button>
        </div>
      )}
    </div>
  );
}

// ── Veli Mektubu Bileşeni ─────────────────────────────────────────────────────
function VeliMektubu({ kayitliListesi, aktifOgrenci, records }) {
  const [seciliAd, setSeciliAd] = useState(aktifOgrenci?.name || "");
  const [mektupTipi, setMektupTipi] = useState("bilgilendirme");
  const [mektup, setMektup] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aramaMetni, setAramaMetni] = useState("");

  useEffect(() => { if (aktifOgrenci?.name) setSeciliAd(aktifOgrenci.name); }, [aktifOgrenci?.name]);

  const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === seciliAd?.toLowerCase().trim());

  async function handleOlustur() {
    if (!seciliAd) return;
    setAiLoading(true);
    const ozet = ogrRec.slice(0,3).map((r,i)=>`Görüşme ${i+1} (${r.date}): ${r.summary}`).join("\n\n");
    const tipler = {
      bilgilendirme:"Veliye öğrencinin PDR görüşmeleri hakkında genel bilgilendirme mektubu",
      davet:"Velinin okula davet edilmesi için resmi davet mektubu",
      bildirim:"Öğrenci hakkında acil durum/risk bildirimi mektubu",
      tesekkur:"Veli iş birliği için teşekkür mektubu"
    };
    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:1500,
        system:"Sen okul PDR danismanisın. MEB resmi yazı formatında, sade ve profesyonel veli mektupları yazarsın.",
        messages:[{role:"user", content:`Öğrenci: ${seciliAd}
Mektup Tipi: ${tipler[mektupTipi]}
Görüşme Özeti:
${ozet||"Henüz görüşme yok."}

MEB resmi yazı formatında veli mektubu yaz. T.C. başlığı, tarih, konu, sayın velimiz hitabı, içerik ve imza bölümü olsun. Markdown kullanma.`}]
      });
    const data = await res.json();
    setMektup(data.content?.[0]?.text || "");
    setAiLoading(false);
  }

  return (
    <div>
      <div style={{background:"#F0FAF4",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:ACCENT,fontWeight:600}}>
        ✉ Veli Bilgilendirme Mektubu — AI destekli resmi yazı
      </div>

      <input placeholder="Öğrenci ara..." value={aramaMetni} onChange={e=>setAramaMetni(e.target.value)} style={{width:"100%",padding:"9px 11px",border:`1px solid ${BORDER}`,borderRadius:9,fontSize:13,boxSizing:"border-box",marginBottom:8}} />
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
        {kayitliListesi.filter(o=>o.name.toLowerCase().includes(aramaMetni.toLowerCase())).slice(0,12).map(o=>{
          const s=seciliAd===o.name;
          return <button key={o.name} onClick={()=>setSeciliAd(o.name)} style={{padding:"4px 10px",borderRadius:16,border:`2px solid ${s?ACCENT:BORDER}`,background:s?ACCENT_LIGHT:CARD,color:s?ACCENT:MUTED,fontSize:11,fontWeight:s?700:500,cursor:"pointer"}}>{o.name}</button>;
        })}
      </div>

      <div style={{fontSize:11,fontWeight:600,color:MUTED,marginBottom:6,textTransform:"uppercase"}}>MEKTUP TİPİ</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
        {[["bilgilendirme","📋 Genel Bilgilendirme"],["davet","📅 Veli Daveti"],["bildirim","⚠ Durum Bildirimi"],["tesekkur","🙏 Teşekkür"]].map(([k,l])=>(
          <button key={k} onClick={()=>setMektupTipi(k)} style={{padding:"8px",borderRadius:8,border:`2px solid ${mektupTipi===k?ACCENT:BORDER}`,background:mektupTipi===k?ACCENT_LIGHT:CARD,color:mektupTipi===k?ACCENT:MUTED,fontSize:12,fontWeight:mektupTipi===k?700:500,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      <button onClick={handleOlustur} disabled={!seciliAd||aiLoading} style={{width:"100%",padding:"11px",background:seciliAd&&!aiLoading?ACCENT:BORDER,color:seciliAd&&!aiLoading?"#fff":MUTED,border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:12}}>
        {aiLoading?"⏳ Mektup hazırlanıyor...":"✦ AI ile Mektup Oluştur"}
      </button>

      {mektup && (
        <div>
          <div id="veli-mektup-icerik">
            <textarea value={mektup} onChange={e=>setMektup(e.target.value)} rows={20} style={{width:"100%",padding:"12px",border:`1px solid ${BORDER}`,borderRadius:10,fontSize:13,lineHeight:1.8,fontFamily:"Arial,sans-serif",boxSizing:"border-box",resize:"vertical",marginBottom:8}} />
          </div>
          <button onClick={()=>raporIndir("veli-mektup-icerik","Veli_Mektubu_"+seciliAd.replace(/\s+/g,"_"))} style={{width:"100%",padding:"10px",background:ACCENT,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            📄 Mektubu İndir
          </button>
        </div>
      )}
    </div>
  );
}



// ── Yıl Seçim Ekranı ─────────────────────────────────────────────────────────
function YilSecimEkrani({ yillar, setYillar, aktifYil, setAktifYil, ogrenciler, onYilSec, onYilSil }) {
  const [yeniYil, setYeniYil] = useState("");
  const [silOnayYil, setSilOnayYil] = useState(null);

  async function handleYilEkle() {
    const yil = yeniYil.trim();
    if (!yil || yillar.includes(yil)) return;
    const updated = [...yillar, yil].sort((a,b) => b.localeCompare(a));
    setYillar(updated);
    await saveYillar(updated);
    setYeniYil("");
  }

  async function handleYilSil(yil) {
    const updated = yillar.filter(y => y !== yil);
    if (updated.length === 0) { alert("En az bir yıl olmalı!"); return; }
    setYillar(updated);
    await saveYillar(updated);
    if (aktifYil === yil) {
      setAktifYil(updated[0]);
      await saveAktifYil(updated[0]);
    }
    onYilSil(yil);
    setSilOnayYil(null);
  }

  return (
    <div style={{padding:"0 0 80px"}}>
      {/* Başlık */}
      <div style={{background:ACCENT,borderRadius:12,padding:"16px 16px",marginBottom:20,color:"#fff"}}>
        <div style={{fontSize:11,fontWeight:600,opacity:0.8,marginBottom:4,textTransform:"uppercase"}}>Akademik Yıllar</div>
        <div style={{fontSize:22,fontWeight:900}}>Yıl Seç veya Ekle</div>
        <div style={{fontSize:12,opacity:0.8,marginTop:4}}>Her yıl ayrı öğrenci listesi tutulur</div>
      </div>

      {/* Yıl kartları */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {yillar.map(yil => {
          const ogrSayisi = ogrenciler.filter(o => !o.yil || o.yil === yil || (yil === yillar[0] && !o.yil)).length;
          const aktif = yil === aktifYil;
          return (
            <div key={yil} style={{
              background:aktif?ACCENT_LIGHT:CARD,
              border:`2px solid ${aktif?ACCENT:BORDER}`,
              borderRadius:14, padding:"14px 16px",
              display:"flex", alignItems:"center", gap:12
            }}>
              {/* Tıklama alanı */}
              <div onClick={() => onYilSec(yil)} style={{flex:1,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:28}}>📅</span>
                  <div>
                    <div style={{fontSize:18,fontWeight:900,color:aktif?ACCENT:TEXT}}>{yil}</div>
                    <div style={{fontSize:12,color:MUTED}}>{ogrSayisi} öğrenci</div>
                  </div>
                </div>
                {aktif && (
                  <span style={{background:ACCENT,color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700}}>
                    ✓ Aktif Yıl
                  </span>
                )}
              </div>

              {/* Sil */}
              {yillar.length > 1 && (
                silOnayYil === yil ? (
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <div style={{fontSize:11,color:"#C0392B",maxWidth:100,marginRight:4}}>
                      {ogrSayisi} öğrenci silinecek!
                    </div>
                    <button onClick={()=>handleYilSil(yil)} style={{background:"#C0392B",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:800,cursor:"pointer"}}>Sil</button>
                    <button onClick={()=>setSilOnayYil(null)} style={{background:BG,color:MUTED,border:`1px solid ${BORDER}`,borderRadius:8,padding:"6px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
                  </div>
                ) : (
                  <button onClick={()=>setSilOnayYil(yil)} style={{background:"none",border:"1px solid #F28B82",color:"#C5221F",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>🗑</button>
                )
              )}
            </div>
          );
        })}
      </div>

      {/* Yeni yıl ekle */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14}}>
        <div style={{fontSize:12,fontWeight:700,color:TEXT,marginBottom:10}}>Yeni Akademik Yıl Ekle</div>
        <div style={{display:"flex",gap:8}}>
          <input
            placeholder="örn. 2026-2027"
            value={yeniYil}
            onChange={e=>setYeniYil(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleYilEkle()}
            style={{flex:1,padding:"10px 12px",border:`1px solid ${BORDER}`,borderRadius:10,fontSize:14,outline:"none"}}
          />
          <button onClick={handleYilEkle} disabled={!yeniYil.trim()} style={{
            padding:"10px 16px",background:yeniYil.trim()?ACCENT:BORDER,
            color:yeniYil.trim()?"#fff":MUTED,border:"none",borderRadius:10,
            fontSize:14,fontWeight:800,cursor:"pointer"
          }}>+ Ekle</button>
        </div>
        <div style={{fontSize:11,color:MUTED,marginTop:8}}>
          Yılı silince o yılın tüm öğrenci kayıtları silinir.
        </div>
      </div>
    </div>
  );
}

// ── Özet Kartı Bileşeni (Seans Öncesi Hazırlık) ─────────────────────────────
function OzetKarti({ ogrenci, ogrRec, ogrP1, ogrP2, ogrRisk, denemeGirilen, denemeAvg, mudahalePlan, hazirlikNotlari, setHazirlikNotlari, ilerlemeNotlari, setIlerlemeNotlari, setTab }) {
  const [hazirlikAiLoading, setHazirlikAiLoading] = useState(false);
  const [aktifPanel, setAktifPanel] = useState("ozet"); // ozet | hazirlik | ilerleme

  // Storage'dan yükle
  const hazirlikNotu = hazirlikNotlari[ogrenci] || "";
  async function setHazirlikNotu(metin) {
    const updated = { ...hazirlikNotlari, [ogrenci]: metin };
    setHazirlikNotlari(updated);
    await saveHazirlikNotlari(updated);
  }

  const ogrMudahale = (mudahalePlan[ogrenci] || []).filter(p => p.durum === "Devam Ediyor");
  const sonGorusme = ogrRec[0];
  const ilkGorusme = ogrRec[ogrRec.length - 1];

  // İlerleme: profil puanı değişimi (birden fazla analiz kaydı varsa)
  const profilPuanlar = ogrP1?.scores || {};
  const dusukBoyutlar = DIMENSIONS.filter(d => (profilPuanlar[d.key]||0) <= 2);
  const yuksekBoyutlar = DIMENSIONS.filter(d => (profilPuanlar[d.key]||0) >= 4);

  // Deneme trendi
  const denemeArtan = denemeGirilen.length > 1 &&
    denemeGirilen[denemeGirilen.length-1].toplam > denemeGirilen[0].toplam;

  async function handleHazirlikNotu() {
    setHazirlikAiLoading(true);
    const gorusmeler = ogrRec.slice(0,5).map((r,i) =>
      `Görüşme ${i+1} (${r.date}): ${r.summary}`
    ).join("\n\n");
    const mudahaleBolum = ogrMudahale.length > 0
      ? "Aktif Müdahale Planı: " + ogrMudahale.map(p => p.hedef).join(", ")
      : "";
    const risk = ogrRisk.length > 0
      ? "Risk: " + ogrRisk.map(r => r.riskTuru).join(", ")
      : "";
    const deneme = denemeAvg ? `Deneme Ortalaması: ${denemeAvg}/90` : "";

    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:1000,
        system:"Sen Dr. Ayse Kara'sin — 20 yillik klinik PDR uzmanisin. Danismana bir sonraki seans icin pratik hazirlik notu yazarsın.",
        messages:[{role:"user", content:`Öğrenci: ${ogrenci}
${gorusmeler}
${mudahaleBolum}
${risk}
${deneme}

Bu öğrenciyle bir sonraki görüşme için seans hazırlık notu yaz:

ÖNCEKİ SEANSLARDAN ÖZET: (en önemli 2-3 nokta)
TAKİP EDİLMESİ GEREKENLER: (son görüşmede kalan konular)
BU SEANSTA ODAKLANILACAKLAR: (somut 2-3 madde)
SORULACAK SORULAR: (açıcı, terapötik sorular)
DİKKAT EDİLECEKLER: (öğrenciye özel hassas noktalar)

Kısa ve pratik yaz, Markdown kullanma.`}]
      });
    const data = await res.json();
    setHazirlikNotu(data.content?.[0]?.text || "");
    setHazirlikAiLoading(false);
  }

  return (
    <div>
      {/* Panel seçici */}
      <div style={{display:"flex", borderBottom:`1px solid ${BORDER}`, marginBottom:14}}>
        {[["ozet","📊 Özet"],["hazirlik","🎯 Seans Hazırlık"],["ilerleme","📈 İlerleme"]].map(([k,l])=>(
          <button key={k} onClick={()=>setAktifPanel(k)} style={{
            flex:1, padding:"8px 4px", border:"none", background:"none",
            color:aktifPanel===k?ACCENT:MUTED, fontWeight:aktifPanel===k?700:500,
            fontSize:12, cursor:"pointer",
            borderBottom:aktifPanel===k?`3px solid ${ACCENT}`:"3px solid transparent"
          }}>{l}</button>
        ))}
      </div>

      {/* ── ÖZET PANELİ ─────────────────────────────────────── */}
      {aktifPanel === "ozet" && (
        <div>
          {/* İstatistik kartları */}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12}}>
            {[
              {label:"Görüşme",val:ogrRec.length,color:ACCENT},
              {label:"Den.Ort.",val:denemeAvg||"—",color:BLUE},
              {label:"Aktif Risk",val:ogrRisk.length>0?"⚠ Var":"✓",color:ogrRisk.length>0?"#C0392B":"#1A8C5B"},
              {label:"Müdahale",val:ogrMudahale.length>0?ogrMudahale.length+" aktif":"—",color:ogrMudahale.length>0?PURPLE:MUTED},
            ].map(c=>(
              <div key={c.label} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:900,color:c.color}}>{c.val}</div>
                <div style={{fontSize:10,color:MUTED}}>{c.label}</div>
              </div>
            ))}
          </div>

          {/* Son görüşme */}
          {sonGorusme && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`4px solid ${ACCENT}`,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:4}}>Son Görüşme · {sonGorusme.date}</div>
              <div style={{fontSize:13,color:TEXT,lineHeight:1.7}}>{sonGorusme.summary}</div>
            </div>
          )}

          {/* Aktif müdahale planı */}
          {ogrMudahale.length > 0 && (
            <div style={{background:"#F0F4FF",border:`1px solid #c7ccf5`,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:"#3B4FD8",textTransform:"uppercase",marginBottom:6}}>Aktif Müdahale Planı</div>
              {ogrMudahale.map(p=>(
                <div key={p.id} style={{fontSize:12,color:TEXT,marginBottom:4}}>
                  🎯 <b>{p.hedef}</b>
                  {p.sure && <span style={{color:MUTED,fontSize:11}}> · {p.sure}</span>}
                </div>
              ))}
            </div>
          )}

          {/* Profil özeti */}
          {ogrP1 && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:8}}>Profil 1</div>
              {dusukBoyutlar.length > 0 && (
                <div style={{marginBottom:6}}>
                  <span style={{fontSize:10,color:"#C0392B",fontWeight:700}}>⚠ Düşük: </span>
                  <span style={{fontSize:11,color:TEXT}}>{dusukBoyutlar.map(d=>d.label).join(", ")}</span>
                </div>
              )}
              {yuksekBoyutlar.length > 0 && (
                <div style={{marginBottom:8}}>
                  <span style={{fontSize:10,color:"#1A8C5B",fontWeight:700}}>✓ Güçlü: </span>
                  <span style={{fontSize:11,color:TEXT}}>{yuksekBoyutlar.map(d=>d.label).join(", ")}</span>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {DIMENSIONS.map(d=>{
                  const val=profilPuanlar[d.key]||0;
                  return (
                    <div key={d.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:10,color:TEXT}}>{d.label}</span>
                      <div style={{display:"flex",alignItems:"center",gap:3}}>
                        <div style={{width:35,height:3,background:BORDER,borderRadius:2}}>
                          <div style={{width:`${(val/5)*100}%`,height:"100%",background:d.color,borderRadius:2}}/>
                        </div>
                        <span style={{fontSize:11,fontWeight:800,color:d.color}}>{val}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Deneme netleri */}
          {denemeGirilen.length > 0 && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12}}>
              <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:8}}>
                Deneme Netleri {denemeGirilen.length > 1 && <span style={{color:denemeArtan?"#1A8C5B":"#C0392B",fontWeight:700}}>{denemeArtan?"↑ Artış":"↓ Düşüş"}</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {denemeGirilen.map(d=>{
                  const c=d.toplam>=70?"#1A8C5B":d.toplam>=50?"#B07D1A":"#C0392B";
                  const bg=d.toplam>=70?"#E6F5EE":d.toplam>=50?"#FDF6E3":"#FDECEA";
                  return <div key={d.no} style={{background:bg,borderRadius:8,padding:"4px 10px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>D{d.no}</div><div style={{fontSize:13,fontWeight:900,color:c}}>{d.toplam.toFixed(1)}</div></div>;
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── SEANS HAZIRLIK PANELİ ────────────────────────────── */}
      {aktifPanel === "hazirlik" && (
        <div>
          <div style={{background:"#FDF6E3",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#B07D1A"}}>
            🎯 Bir sonraki görüşme öncesi Dr. Ayşe Kara sana hazırlık notu hazırlasın
          </div>

          <button onClick={handleHazirlikNotu} disabled={hazirlikAiLoading||ogrRec.length===0} style={{
            width:"100%", padding:"12px", marginBottom:12,
            background:hazirlikAiLoading||ogrRec.length===0?BORDER:PURPLE,
            color:hazirlikAiLoading||ogrRec.length===0?"#666":"#fff",
            border:"none", borderRadius:10, fontSize:14, fontWeight:800, cursor:"pointer"
          }}>
            {hazirlikAiLoading?"⏳ Hazırlık notu oluşturuluyor...":ogrRec.length===0?"Önce görüşme notu ekleyin":"✦ Seans Hazırlık Notu Oluştur"}
          </button>

          {hazirlikNotu ? (
            <div style={{background:CARD,border:`2px solid ${PURPLE}22`,borderRadius:12,padding:14}}>
              <div style={{fontSize:11,fontWeight:700,color:PURPLE,textTransform:"uppercase",marginBottom:10}}>Seans Hazırlık Notu</div>
              <div style={{fontSize:13,color:TEXT,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{hazirlikNotu}</div>
            </div>
          ) : ogrRec.length > 0 ? (
            <div style={{textAlign:"center",color:MUTED,marginTop:30,fontSize:13}}>
              <div style={{fontSize:32,marginBottom:8}}>🎯</div>
              Butona bas, AI önceki görüşmelere bakarak<br/>bir sonraki seans için hazırlık notu hazırlasın
            </div>
          ) : null}
        </div>
      )}

      {/* ── İLERLEME TAKİBİ PANELİ ─────────────────────────── */}
      {aktifPanel === "ilerleme" && (
        <div>
          <div style={{background:"#E6F5EE",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:ACCENT}}>
            📈 Öğrencinin görüşme sürecindeki gelişimi
          </div>

          {/* Görüşme sıklığı */}
          {ogrRec.length > 0 && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:8}}>Görüşme Süreci</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:ACCENT}}>{ogrRec.length}</div>
                  <div style={{fontSize:10,color:MUTED}}>Toplam Görüşme</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{ilkGorusme?.date}</div>
                  <div style={{fontSize:10,color:MUTED}}>İlk Görüşme</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{sonGorusme?.date}</div>
                  <div style={{fontSize:10,color:MUTED}}>Son Görüşme</div>
                </div>
              </div>
              {/* Görüşme zaman çizelgesi bar */}
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                {[...ogrRec].reverse().map((r,i)=>(
                  <div key={r.id} title={r.date} style={{
                    width:20, height:20, borderRadius:4,
                    background:r.meetingType==="Veli"?ORANGE:ACCENT,
                    opacity:0.4+(i/ogrRec.length)*0.6,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:9,color:"#fff",fontWeight:700
                  }}>{i+1}</div>
                ))}
              </div>
            </div>
          )}

          {/* Profil güçlü/zayıf */}
          {ogrP1 && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:10}}>Profil Analizi</div>
              {DIMENSIONS.map(d=>{
                const val=profilPuanlar[d.key]||0;
                const renk=val>=4?"#1A8C5B":val>=3?BLUE:val>=2?"#B07D1A":"#C0392B";
                const bg=val>=4?"#E6F5EE":val>=3?"#EEF2FF":val>=2?"#FDF6E3":"#FDECEA";
                return (
                  <div key={d.key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:11,color:TEXT,width:110,flexShrink:0}}>{d.label}</span>
                    <div style={{flex:1,height:8,background:BORDER,borderRadius:4}}>
                      <div style={{width:`${(val/5)*100}%`,height:"100%",background:renk,borderRadius:4}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:900,color:renk,width:20,textAlign:"right"}}>{val}</span>
                    <span style={{fontSize:10,background:bg,color:renk,borderRadius:10,padding:"1px 6px",width:60,textAlign:"center",flexShrink:0}}>
                      {val>=4?"Güçlü":val>=3?"İyi":val>=2?"Gelişiyor":"Destek"}
                    </span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Deneme trendi */}
          {denemeGirilen.length > 1 && (
            <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12}}>
              <div style={{fontSize:11,fontWeight:700,color:MUTED,textTransform:"uppercase",marginBottom:8}}>Deneme Trendi</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:60,marginBottom:6}}>
                {denemeGirilen.map((d,i)=>{
                  const maxT=Math.max(...denemeGirilen.map(x=>x.toplam));
                  const h=Math.max(8,(d.toplam/maxT)*55);
                  const c=d.toplam>=70?"#1A8C5B":d.toplam>=50?"#B07D1A":"#C0392B";
                  return (
                    <div key={d.no} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{fontSize:8,color:c,fontWeight:700}}>{d.toplam.toFixed(0)}</div>
                      <div style={{width:"100%",height:h,background:c,borderRadius:"3px 3px 0 0",opacity:0.8}}/>
                      <div style={{fontSize:8,color:MUTED}}>D{d.no}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:MUTED}}>İlk: <b style={{color:TEXT}}>{denemeGirilen[0].toplam.toFixed(1)}</b></span>
                <span style={{color:denemeArtan?"#1A8C5B":"#C0392B",fontWeight:700}}>
                  {denemeArtan?"↑ ":"↓ "}{Math.abs(denemeGirilen[denemeGirilen.length-1].toplam-denemeGirilen[0].toplam).toFixed(1)} net
                </span>
                <span style={{color:MUTED}}>Son: <b style={{color:TEXT}}>{denemeGirilen[denemeGirilen.length-1].toplam.toFixed(1)}</b></span>
              </div>
            </div>
          )}

          {/* Seans Arası İlerleme Değerlendirmesi */}
          {ogrRec.length >= 2 && (
            <IlerlemeYazisi ogrenci={ogrenci} ogrRec={ogrRec} ogrP1={ogrP1} denemeGirilen={denemeGirilen} ilerlemeNotlari={ilerlemeNotlari} setIlerlemeNotlari={setIlerlemeNotlari} />
          )}

          {ogrRec.length === 0 && !ogrP1 && (
            <div style={{textAlign:"center",color:MUTED,marginTop:40,fontSize:13}}>
              <div style={{fontSize:36,marginBottom:8}}>📈</div>
              Henüz veri yok. Görüşme ve profil ekledikçe ilerleme burada görünür.
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ── İlerleme Yazısı Bileşeni ─────────────────────────────────────────────────
function IlerlemeYazisi({ ogrenci, ogrRec, ogrP1, denemeGirilen, ilerlemeNotlari, setIlerlemeNotlari }) {
  const [loading, setLoading] = useState(false);

  // Storage'dan yükle
  const yazı = ilerlemeNotlari[ogrenci] || "";
  async function setYazi(metin) {
    const updated = { ...ilerlemeNotlari, [ogrenci]: metin };
    setIlerlemeNotlari(updated);
    await saveIlerlemeNotlari(updated);
  }

  async function handleOlustur() {
    setLoading(true);

    // Seans kronolojisi
    const seanslar = [...ogrRec]
      .sort((a,b) => {
        const parse = d => { const [g,ay,y]=(d||"").split("."); return new Date(`${y}-${ay}-${g}`); };
        return parse(a.date) - parse(b.date);
      })
      .map((r,i) => `SEANS ${i+1} (${r.date}): ${r.summary}`)
      .join("\n\n");

    const profilBolum = ogrP1?.scores
      ? "PROFİL PUANLARI: " + DIMENSIONS.map(d => `${d.label}: ${ogrP1.scores[d.key]||0}/5`).join(", ")
      : "";

    const denemeBolum = denemeGirilen.length > 0
      ? "DENEME NETLERI: " + denemeGirilen.map(d => `D${d.no}: ${d.toplam.toFixed(1)}`).join(", ")
      : "";

    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:2000,
        system:"Sen Dr. Ayse Kara'sin — 20 yillik klinik PDR uzmanisin. BDT, baglanma teorisi ve varoluşçu perspektiften seans süreci değerlendirmesi yazarsın. Gelişmeleri somut ve destekleyici dille aktarırsın.",
        messages:[{role:"user", content:`Öğrenci: ${ogrenci}

SEANS GEÇMİŞİ (kronolojik):
${seanslar}

${profilBolum}
${denemeBolum}

Bu öğrencinin seans süreci boyunca gösterdiği ilerlemeyi kapsamlı değerlendir:

GENEL İLERLEME DEĞERLENDİRMESİ:
(Süreç boyunca gözlemlenen genel değişim ve gelişme)

OLUMLU GELİŞMELER:
(Seanslar arasında öne çıkan somut iyileşmeler, güçlenen alanlar, kazanılan beceriler)

SEANS ARASI FARK:
(İlk seanstan bu yana ne değişti, hangi konularda dönüşüm yaşandı)

DEVAM EDEN ÇALIŞMA ALANLARI:
(Hâlâ gelişim gerektiren, üzerinde çalışılmaya devam edilecek konular)

GÜÇLÜ YÖNLERİ:
(Öğrencinin terapötik süreçteki güç kaynakları, koruyucu faktörler)

GENEL GÖRÜŞ:
(Süreç hakkında kısa ve destekleyici genel değerlendirme)

Sade, klinik ama sıcak bir dil kullan. Markdown kullanma.`}]
      });
    const data = await res.json();
    setYazi(data.content?.[0]?.text || "");
    setLoading(false);
  }

  return (
    <div style={{marginTop:14}}>
      <div style={{background:"#F0F4FF",border:`1px solid #c7ccf5`,borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:12,color:"#3B4FD8"}}>
        📝 Seanslar arası ilerlemeyi ve olumlu gelişmeleri AI yazıyla değerlendirsin
      </div>

      <button onClick={handleOlustur} disabled={loading} style={{
        width:"100%", padding:"12px", marginBottom:12,
        background:loading?BORDER:PURPLE,
        color:loading?"#666":"#fff",
        border:"none", borderRadius:10, fontSize:14, fontWeight:800, cursor:"pointer"
      }}>
        {loading?"⏳ İlerleme değerlendirmesi yazılıyor...":"✦ Seans Arası İlerleme Değerlendirmesi Yaz"}
      </button>

      {yazı && (
        <div style={{background:CARD,border:`2px solid ${PURPLE}33`,borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:PURPLE,textTransform:"uppercase"}}>
              İlerleme Değerlendirmesi — {ogrenci}
            </div>
            <button onClick={()=>{
              const el = document.getElementById("ilerleme-yazisi-"+ogrenci.replace(/\s+/g,"_"));
              if (el) raporIndir("ilerleme-yazisi-"+ogrenci.replace(/\s+/g,"_"), "Ilerleme_"+ogrenci.replace(/\s+/g,"_"));
            }} style={{background:PURPLE,color:"#fff",border:"none",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              📄 İndir
            </button>
          </div>
          <div id={"ilerleme-yazisi-"+ogrenci.replace(/\s+/g,"_")} style={{fontSize:13,color:TEXT,lineHeight:1.9,whiteSpace:"pre-wrap"}}>
            {yazı}
          </div>
        </div>
      )}
    </div>
  );
}


// ── Ayarlar Ekranı (kendi Anthropic API anahtarı) ─────────────────
function AyarlarEkrani() {
  const [key, setKey] = useState(() => pdrGetApiKey());
  const [gosterKey, setGosterKey] = useState(false);
  const [kaydedildi, setKaydedildi] = useState(false);

  function handleKaydet() {
    pdrSetApiKey(key);
    setKaydedildi(true);
    setTimeout(() => setKaydedildi(false), 2500);
  }

  return (
    <div style={{ maxWidth: 520 }}>
      <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 6 }}>⚙️ Ayarlar</div>
      <div style={{ fontSize: 14, color: MUTED, marginBottom: 16, lineHeight: 1.5 }}>
        Yapay zeka özelliklerini (özet çıkarma, risk değerlendirmesi, müdahale planı vb.)
        kullanabilmek için kendi Anthropic API anahtarınızı girmeniz gerekir. Anahtarınız
        sadece bu tarayıcıda saklanır, hiçbir sunucuya gönderilmez.
      </div>

      <div style={{ background: "#f5f5f5", borderRadius: 12, padding: 14, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 8, fontSize: 14 }}>Anthropic API Anahtarı</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input
            type={gosterKey ? "text" : "password"}
            value={key}
            onChange={(e) => setKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{ flex: 1, padding: 10, borderRadius: 8, border: "1px solid #ccc", fontSize: 14 }}
          />
          <button onClick={() => setGosterKey(!gosterKey)} style={{
            padding: "0 12px", borderRadius: 8, border: "1px solid #ccc", background: "#fff", cursor: "pointer"
          }}>{gosterKey ? "Gizle" : "Göster"}</button>
        </div>
        <button onClick={handleKaydet} style={{
          marginTop: 10, width: "100%", padding: 12, background: ACCENT, color: "#fff",

        </ol>
      </div>
    </div>
  );
}


// ── Rehber Pusula Bileşeni ─────────────────────────────────────
function ProfDanismaEkrani({
  kayitliListesi, aktifOgrenci, records, profiles, profiles2,
  denemeler, riskListesi, mudahalePlan, sevkler,
  hazirlikNotlari, ilerlemeNotlari, profNotlari, setProfNotlari
}) {
  const [seciliAd, setSeciliAd] = useState(aktifOgrenci?.name || "");
  const [aramaMetni, setAramaMetni] = useState("");
  const [soru, setSoru] = useState("");
  const [loading, setLoading] = useState(false);
  const [mod, setMod] = useState("genel"); // genel | soru

  useEffect(() => { if (aktifOgrenci?.name) setSeciliAd(aktifOgrenci.name); }, [aktifOgrenci?.name]);

  const ogrKonusma = profNotlari[seciliAd] || [];

  function tumVeriHazirla(ad) {
    const adLower = ad.toLowerCase().trim();
    const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === adLower);
    const ogrP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === adLower);
    const ogrP2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === adLower);
    const ogrDen = denemeler[ad] || {};
    const ogrRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === adLower && !r.kapandi);
    const ogrMud = (mudahalePlan[ad] || []).filter(p => p.durum === "Devam Ediyor");
    const ogrSevk = sevkler.filter(s => s.studentName?.toLowerCase().trim() === adLower);
    const ogrHazirlik = hazirlikNotlari[ad] || "";
    const ogrIlerleme = ilerlemeNotlari[ad] || "";

    const denemeGirilen = Object.entries(ogrDen).sort((a,b)=>a[0]-b[0]).map(([no,nets])=>({
      no:parseInt(no), nets,
      toplam: LGS_DERSLER.reduce((s,d)=>s+(parseFloat(nets[d.key])||0),0)
    }));
    const denemeAvg = denemeGirilen.length > 0
      ? (denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1) : null;

    return `
ÖĞRENCİ: ${ad}

GÖRÜŞME GEÇMİŞİ (${ogrRec.length} görüşme):
${ogrRec.map((r,i)=>`Seans ${i+1} (${r.date}, ${r.meetingType||"Öğrenci"}): ${r.summary}`).join("\n") || "Yok"}


PROFİL 1 — PSİKOSOSYAL BOYUTLAR:
${ogrP1?.scores ? DIMENSIONS.map(d=>`${d.label}: ${ogrP1.scores[d.key]||0}/5`).join(", ") : "Girilmemiş"}
${ogrP1?.analiz ? `PDR Analizi: ${ogrP1.analiz}` : ""}

PROFİL 2 — AKADEMİK:
${ogrP2?.sinavlar ? DERSLER.map(d=>`${d.label}: 1.Yazılı ${ogrP2.sinavlar[d.key+"1"]||"-"}, 2.Yazılı ${ogrP2.sinavlar[d.key+"2"]||"-"}`).join(", ") : "Girilmemiş"}
${ogrP2?.d2 ? `D2 Dikkat: TN=${ogrP2.d2.TN||"-"}, E%=${ogrP2.d2.E_yuzde||"-"}, PR=${ogrP2.d2.PR||"-"}` : ""}
${ogrP2?.kariyer_hedef ? `Kariyer Hedefi: ${ogrP2.kariyer_hedef}` : ""}

DENEME SONUÇLARI:
${denemeGirilen.length > 0 ? `Ortalama: ${denemeAvg}/90
${denemeGirilen.map(d=>`D${d.no}: ${d.toplam.toFixed(1)}/90`).join(", ")}` : "Girilmemiş"}

AKTİF RİSKLER (${ogrRisk.length}):
${ogrRisk.map(r=>`${r.oncelik} - ${r.riskTuru}: ${r.aciklama} ${r.aiAnaliz||""}`).join("\n") || "Yok"}



AKTİF MÜDAHALE PLANLARI:
${ogrMud.map(p=>`Hedef: ${p.hedef} | Süre: ${p.sure||"-"}`).join("\n") || "Yok"}


SEVK KAYITLARI:
${ogrSevk.map(s=>`${s.tarih} - ${s.sevkYeri}: ${s.sevkNedeni} [${s.sonucBekleniyor?"Bekliyor":"Tamamlandi"}]`).join("\n") || "Yok"}


DR. AYŞE KARA'NIN DEĞERLENDİRMELERİ:
Seans Hazırlık Notu: ${ogrHazirlik || "Henüz oluşturulmamış"}
İlerleme Değerlendirmesi: ${ogrIlerleme || "Henüz oluşturulmamış"}
    `.trim();
  }

  async function handleGenel() {
    if (!seciliAd) return;
    setLoading(true);
    const veri = tumVeriHazirla(seciliAd);
    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:4000,
        system: PROF_HAKAN,
        messages:[{role:"user", content:`${veri}

Bu öğrencinin tüm verilerini ve Dr. Ayşe Kara'nın değerlendirmelerini inceleyerek kapsamlı bir klinik süpervizyon raporu yaz:

KLİNİK İZLENİM:
(Öğrencinin genel psikolojik profili, güçlü ve zayıf yanları)

DR. AYŞE KARA DEĞERLENDİRMELERİNİN SÜPERVİZYONU:
(Yapılan değerlendirmeleri üst düzey perspektiften yorumla, eksik veya dikkat edilmesi gereken noktaları belirt)

ENTEGRATİF ANALİZ:
(Tüm veriler bir arada ne anlatıyor — akademik, duygusal, sosyal, ailesel boyutlar arası etkileşim)

KRİTİK GÖZLEMLER:
(Gözden kaçmış olabilecek önemli noktalar, uyarılar)

ÖNERİLEN YAKLAŞIM:
(Bundan sonraki süreçte PDR danışmanına öneriler — teorik temel ve pratik adımlar)

UZUN VADELİ PROGNOZ:
(Mevcut gidişatla ne beklenebilir, nasıl önlenebilir veya desteklenebilir)

Akademik ama sıcak, yapıcı bir dil kullan. Markdown kullanma.`}]
      });
    const data = await res.json();
    const cevap = data.content?.[0]?.text || "";
    const yeniKayit = { id: uid(), tarih: today(), tip: "genel", soru: "Genel Süpervizyon", cevap };
    const updated = { ...profNotlari, [seciliAd]: [yeniKayit, ...(profNotlari[seciliAd]||[])] };
    setProfNotlari(updated);
    await saveProfNotlari(updated);
    setLoading(false);
  }

  async function handleSoru() {

DANIŞMANIN SORUSU: ${soru}

Bu soruyu tüm verileri ve Dr. Ayşe Kara'nın değerlendirmelerini göz önünde bulundurarak yanıtla. Akademik derinlikte ama pratik ve uygulanabilir bir yanıt ver. Yanıtının sonunda gerekli görürsen 1-2 adet takip sorusu sor — 'TAKIP SORULARIM:' başlığı altında. Markdown kullanma.`}]

        {kayitliListesi.filter(o=>o.name.toLowerCase().includes(aramaMetni.toLowerCase())).slice(0,15).map(o=>{

              📊 Genel Süpervizyon
            </button>
            <button onClick={()=>setMod("soru")} style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${mod==="soru"?"#1a1a2e":BORDER}`,background:mod==="soru"?"#1a1a2e":CARD,color:mod==="soru"?"#fff":MUTED,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              💬 Soru Sor
            </button>
          </div>

          {/* Genel süpervizyon */}
          {mod === "genel" && (
            <button onClick={handleGenel} disabled={loading} style={{
              width:"100%", padding:"13px", marginBottom:14,

            }}>

          {/* Soru sor */}
          {mod === "soru" && (

                placeholder="Rehber Pusula'ya sorunuzu yazın...&#10;Örn: Bu öğrencide kaygıyı nasıl ele almalıyım?&#10;Örn: Aile görüşmesinde ne söylemeliyim?&#10;Örn: Risk değerlendirmesi doğru mu?"
                value={soru}

// ── Prof. Cevap Alanı Bileşeni ───────────────────────────────────────────────
function ProfCevapAlani({ konusmaId, seciliAd, oncekiVeri, profNotlari, setProfNotlari }) {
  const [cevap, setCevap] = useState("");
  const [loading, setLoading] = useState(false);
  const [goster, setGoster] = useState(false);

  async function handleCevapGonder() {
    if (!cevap.trim()) return;
    setLoading(true);
    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:3000,
        system: PROF_HAKAN,
        messages:[{role:"user", content:`Öğrenci: ${seciliAd}

Önceki değerlendirmem ve sorularım:
${oncekiVeri}

Danışmanın cevabı:
${cevap}

Bu bilgiyi de göz önünde bulundurarak değerlendirmeni güncelle ve derinleştir. Gerekirse ek sorular sorabilirsin. Markdown kullanma.`}]
      });
    const data = await res.json();
    const yeniCevap = data.content?.[0]?.text || "";
    const yeniKayit = {
      id: uid(), tarih: today(), tip: "takip",
      soru: "Takip cevabı: " + cevap.substring(0,50) + "...",
      cevap: yeniCevap
    };
    const updated = { ...profNotlari, [seciliAd]: [yeniKayit, ...(profNotlari[seciliAd]||[])] };
    setProfNotlari(updated);
    await saveProfNotlari(updated);
    setCevap("");
    setGoster(false);
    setLoading(false);
  }

  if (!goster) return (
    <button onClick={()=>setGoster(true)} style={{
      marginTop:8, padding:"6px 14px",
      background:"#EEF2FF", color:"#3B4FD8",
      border:"1px solid #c7ccf5", borderRadius:8,
      fontSize:11, fontWeight:700, cursor:"pointer"
    }}>
      💬 Prof'un Sorularını Yanıtla
    </button>
  );

  return (
    <div style={{marginTop:10, background:"#EEF2FF", borderRadius:10, padding:12}}>
      <div style={{fontSize:11, fontWeight:700, color:"#3B4FD8", marginBottom:8}}>
        Rehber Pusula'nın sorularını yanıtlayın
      </div>
      <textarea
        placeholder="Prof'un sorularına cevabınızı yazın..."
        value={cevap}
        onChange={e=>setCevap(e.target.value)}
        rows={4}
        style={{width:"100%", padding:"8px 10px", border:"1px solid #c7ccf5", borderRadius:8, fontSize:12, resize:"vertical", boxSizing:"border-box", fontFamily:"inherit", marginBottom:8}}
      />
      <div style={{display:"flex", gap:8}}>
        <button onClick={()=>setGoster(false)} style={{flex:1, padding:"8px", background:"#fff", color:MUTED, border:`1px solid ${BORDER}`, borderRadius:8, fontSize:12, cursor:"pointer"}}>
          İptal
        </button>
        <button onClick={handleCevapGonder} disabled={!cevap.trim()||loading} style={{
          flex:2, padding:"8px",
          background:cevap.trim()&&!loading?"#1a1a2e":BORDER,
          color:cevap.trim()&&!loading?"#fff":MUTED,
          border:"none", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer"
        }}>
          {loading ? "⏳ Prof. değerlendiriyor..." : "🎓 Gönder ve Derinleştir"}
        </button>
      </div>
    </div>
  );
}


// ── Excel Toplu Yükleme (7. Sınıf) ─────────────────────────────────────────
function ExcelTopluYukle({ ogrenciler, setOgrenciler, denemeler, setDenemeler, aktifYil, onKapat }) {
  const [yukleniyor, setYukleniyor] = useState(false);
  const [sonuc, setSonuc] = useState(null);

  async function handleDosya(e) {
    const file = e.target.files[0];
    if (!file) return;
    setYukleniyor(true);
    setSonuc(null);

    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        const yeniOgrenciler = [];
        const yeniDenemeler = { ...denemeler };
        let eklenen = 0;

        // Başlık satırlarını atla — ilk boş olmayan veri satırından başla
        let baslangic = 0;
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          const adSoyad = String(row[1] || "").trim();
          if (adSoyad && !adSoyad.includes("AD") && !adSoyad.includes("SOYAD") && !adSoyad.startsWith("*")) {
            baslangic = i;
            break;
          }
        }

        for (let i = baslangic; i < rows.length; i++) {
          const row = rows[i];
          const no = String(row[0] || "").trim();
          const adSoyad = String(row[1] || "").trim();
          const sube = String(row[2] || "").trim();

          if (!adSoyad || adSoyad.startsWith("*") || adSoyad.includes("OKUL") || adSoyad.includes("SINIF")) continue;

          // 7.sınıf 9 deneme netleri (D-L sütunları, index 3-11)
          const deneme7 = {};
          let toplamGirilen = 0;
          let toplamNet = 0;
          for (let d = 0; d < 9; d++) {
            const net = parseFloat(String(row[3 + d]).replace(",", "."));
            if (!isNaN(net) && net > 0) {
              deneme7[d + 1] = { "7sinif": true, toplam_net: net };
              toplamNet += net;
              toplamGirilen++;
            }
          }

          const ort = toplamGirilen > 0 ? toplamNet / toplamGirilen : 0;

          // Risk seviyesi
          const risk7 = ort >= 55 ? "dusuk" : ort >= 30 ? "orta" : "yuksek";

          // Mevcut öğrenci var mı?
          const mevcut = ogrenciler.find(o =>
            o.studentName.toLowerCase().trim() === adSoyad.toLowerCase().trim()
          );

          if (!mevcut) {
            yeniOgrenciler.push({
              id: uid(),
              studentName: adSoyad,
              className: sube,
              numara: no,
              yil: aktifYil,
              tarih: today(),
              risk7sinif: risk7,
              ort7sinif: ort.toFixed(1)
            });
            eklenen++;
          } else {
            // Mevcut öğrenciye 7.sınıf bilgisi ekle
            mevcut.risk7sinif = risk7;
            mevcut.ort7sinif = ort.toFixed(1);
          }

          // 7.sınıf denemelerini "7s_" prefix ile kaydet
          if (Object.keys(deneme7).length > 0) {
            const ogrDen = yeniDenemeler[adSoyad] || {};
            ogrDen["7sinif"] = { denemeler: deneme7, ortalama: ort.toFixed(1), risk: risk7 };
            yeniDenemeler[adSoyad] = ogrDen;
          }
        }

        const tumOgrenciler = [...ogrenciler, ...yeniOgrenciler];
        setOgrenciler(tumOgrenciler);
        await saveOgrenciler(tumOgrenciler);
        setDenemeler(yeniDenemeler);
        await saveDenemeler(yeniDenemeler);

        // Risk özeti
        const yuksek = [...ogrenciler, ...yeniOgrenciler].filter(o => o.risk7sinif === "yuksek").length;
        const orta = [...ogrenciler, ...yeniOgrenciler].filter(o => o.risk7sinif === "orta").length;
        const dusuk = [...ogrenciler, ...yeniOgrenciler].filter(o => o.risk7sinif === "dusuk").length;

        setSonuc({ eklenen, toplam: tumOgrenciler.length, yuksek, orta, dusuk });
      } catch (err) {
        setSonuc({ hata: err.message });
      }
      setYukleniyor(false);
    };
    reader.readAsBinaryString(file);
  }

  return (
    <div style={{background:CARD, border:`2px solid #1A8C5B`, borderRadius:14, padding:16, marginBottom:16}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
        <div style={{fontSize:14, fontWeight:800, color:TEXT}}>📊 7. Sınıf Excel Yükle</div>
        <button onClick={onKapat} style={{background:"none", border:"none", color:MUTED, fontSize:18, cursor:"pointer"}}>✕</button>
      </div>

      <div style={{background:"#E6F5EE", borderRadius:8, padding:"8px 12px", marginBottom:12, fontSize:11, color:"#1A8C5B"}}>
        Format: <b>A=No | B=Ad Soyad | C=Şube | D-L=9 Deneme Toplam Net</b>
        <br/>Risk: 🔴 0-30 Yüksek · 🟡 30-55 Orta · 🟢 55+ Düşük
      </div>

      <input type="file" accept=".xlsx,.xls" onChange={handleDosya} style={{display:"none"}} id="excel7-input" />
      <label htmlFor="excel7-input" style={{
        display:"block", width:"100%", padding:"12px",
        background:yukleniyor?"#ccc":"#1A8C5B", color:"#fff",
        border:"none", borderRadius:10, fontSize:14, fontWeight:800,
        cursor:"pointer", textAlign:"center", boxSizing:"border-box"
      }}>
        {yukleniyor ? "⏳ Yükleniyor..." : "📂 Excel Dosyası Seç (.xlsx)"}
      </label>

      {sonuc && !sonuc.hata && (
        <div style={{marginTop:12}}>
          <div style={{background:"#E6F5EE", borderRadius:8, padding:10, marginBottom:8}}>
            <div style={{fontSize:13, fontWeight:700, color:"#1A8C5B", marginBottom:6}}>✓ Yükleme Tamamlandı!</div>
            <div style={{fontSize:12, color:TEXT}}>{sonuc.eklenen} yeni öğrenci eklendi · Toplam: {sonuc.toplam}</div>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
            <div style={{background:"#FDECEA", borderRadius:8, padding:"8px", textAlign:"center"}}>
              <div style={{fontSize:20, fontWeight:900, color:"#C0392B"}}>{sonuc.yuksek}</div>
              <div style={{fontSize:10, color:"#C0392B", fontWeight:700}}>🔴 Yüksek Risk</div>
              <div style={{fontSize:9, color:"#C0392B"}}>0-30 net</div>
            </div>
            <div style={{background:"#FDF6E3", borderRadius:8, padding:"8px", textAlign:"center"}}>
              <div style={{fontSize:20, fontWeight:900, color:"#B07D1A"}}>{sonuc.orta}</div>
              <div style={{fontSize:10, color:"#B07D1A", fontWeight:700}}>🟡 Orta Risk</div>
              <div style={{fontSize:9, color:"#B07D1A"}}>30-55 net</div>
            </div>
            <div style={{background:"#E6F5EE", borderRadius:8, padding:"8px", textAlign:"center"}}>
              <div style={{fontSize:20, fontWeight:900, color:"#1A8C5B"}}>{sonuc.dusuk}</div>
              <div style={{fontSize:10, color:"#1A8C5B", fontWeight:700}}>🟢 Düşük Risk</div>
              <div style={{fontSize:9, color:"#1A8C5B"}}>55+ net</div>
            </div>
          </div>
        </div>
      )}

      {sonuc?.hata && (
        <div style={{marginTop:10, padding:10, background:"#FDECEA", borderRadius:8, fontSize:12, color:"#C0392B"}}>
          Hata: {sonuc.hata}
        </div>
      )}
    </div>
  );
}


// ── Sil Butonu Bileşeni ───────────────────────────────────────────────────────
function SilButonu({ onSil }) {
  const [onay, setOnay] = useState(false);
  if (onay) return (
    <div style={{ display:"flex", gap:4, flexShrink:0 }}>
      <button onClick={e => { e.stopPropagation(); onSil(); }} style={{ background:"#C0392B", color:"#fff", border:"none", borderRadius:6, padding:"5px 9px", fontSize:11, fontWeight:800, cursor:"pointer" }}>✓ Sil</button>
      <button onClick={e => { e.stopPropagation(); setOnay(false); }} style={{ background:"#f5f5f5", color:"#666", border:"1px solid #ddd", borderRadius:6, padding:"5px 8px", fontSize:11, cursor:"pointer" }}>✕</button>
    </div>
  );
  return (
    <button onClick={e => { e.stopPropagation(); setOnay(true); }} style={{ background:"none", border:"1px solid #F28B82", color:"#C5221F", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, cursor:"pointer", flexShrink:0 }}>🗑</button>
  );
}

function OgrenciYonetim({
  ogrenciler, setOgrenciler,
  records, setRecords,
  profiles, setProfiles,
  profiles2, setProfiles2,
  denemeler, setDenemeler,
  riskListesi, setRiskListesi,
  kayitliListesi, mudahalePlan, aktifYil, onYilEkrani,
  hazirlikNotlari, setHazirlikNotlari,
  ilerlemeNotlari, setIlerlemeNotlari,
  onRaporAc, setAktifOgrenci, setTab
}) {

  const [aramaMetni, setAramaMetni] = useState("");
  const [aramaDebounce, setAramaDebounce] = useState("");
  const [seciliOgrenci, setSeciliOgrenci] = useState(null);
  const [excelPanelAcik, setExcelPanelAcik] = useState(false);

  // Arama debounce — 300ms bekle
  useEffect(() => {
    const t = setTimeout(() => setAramaDebounce(aramaMetni), 300);
    return () => clearTimeout(t);
  }, [aramaMetni]);
  const [yeniForm, setYeniForm] = useState({ studentName:"", className:"", numara:"" });
  const [formAcik, setFormAcik] = useState(false);
  const [aktifSekme, setAktifSekme] = useState("ozet"); // ozet | gorusme | deneme | profil
  const [sinifFiltre, setSinifFiltre] = useState("Tümü");

  async function handleOgrenciSil(studentName) {
    const ad = studentName.toLowerCase().trim();
    const updOgr = ogrenciler.filter(o => o.studentName.toLowerCase().trim() !== ad);
    setOgrenciler(updOgr); await saveOgrenciler(updOgr);
    const updRec = records.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRecords(updRec); await saveRecords(updRec);
    const updP1 = profiles.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles(updP1); await saveProfiles(updP1);
    const updP2 = profiles2.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    setProfiles2(updP2); await saveProfiles2(updP2);
    const updDen = { ...denemeler };
    Object.keys(updDen).forEach(k => { if (k.toLowerCase().trim() === ad) delete updDen[k]; });
    setDenemeler(updDen); await saveDenemeler(updDen);
    const updRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    setRiskListesi(updRisk); await saveRiskListesi(updRisk);
    if (setAktifOgrenci) setAktifOgrenci({ name: "", className: "" });
    setSeciliOgrenci(null);
  }

  // Öğrenci listesi — aktif yıla göre filtrele (useMemo ile cache)
  const tumOgrenciler = useMemo(() =>
    ogrenciler
      .filter(o => !o.yil || o.yil === aktifYil)
      .slice()
      .sort((a,b) => (a.studentName||"").localeCompare(b.studentName||"", "tr")),
  [ogrenciler, aktifYil]);

  const filtreliListe = useMemo(() => tumOgrenciler.filter(o =>
    !aramaDebounce ||
    o.studentName?.toLowerCase().includes(aramaDebounce.toLowerCase()) ||
    o.className?.toLowerCase().includes(aramaDebounce.toLowerCase()) ||
    o.numara?.includes(aramaDebounce)
  ), [tumOgrenciler, aramaDebounce]);

  async function handleOgrenciSil(studentName) {
    const ad = studentName.toLowerCase().trim();
    // Hepsini paralel sil
    const updOgr = ogrenciler.filter(o => o.studentName?.toLowerCase().trim() !== ad);
    const updRec = records.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    const updP1 = profiles.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    const updP2 = profiles2.filter(p => p.studentName?.toLowerCase().trim() !== ad);
    const updDen = { ...denemeler };
    Object.keys(updDen).forEach(k => { if (k.toLowerCase().trim() === ad) delete updDen[k]; });
    const updRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() !== ad);
    // State'leri güncelle
    setOgrenciler(updOgr);
    setRecords(updRec);
    setProfiles(updP1);
    setProfiles2(updP2);
    setDenemeler(updDen);
    setRiskListesi(updRisk);
    // Storage'a kaydet
    await Promise.all([
      saveOgrenciler(updOgr),
      saveRecords(updRec),
      saveProfiles(updP1),
      saveProfiles2(updP2),
      saveDenemeler(updDen),
      saveRiskListesi(updRisk),
    ]);
    if (aktifOgrenci?.name?.toLowerCase().trim() === ad) setAktifOgrenci({ name: "", className: "" });
    setSeciliOgrenci(null);
  }


  async function handleOgrenciEkle() {
    if (!yeniForm.studentName.trim()) return;
    const yeni = { id: uid(), ...yeniForm, yil: aktifYil, tarih: today() };
    const updated = [yeni, ...ogrenciler];
    setOgrenciler(updated);
    await saveOgrenciler(updated);
    setSeciliOgrenci(yeniForm.studentName);
    if(setAktifOgrenci) setAktifOgrenci({ name: yeniForm.studentName, className: yeniForm.className });
    setYeniForm({ studentName:"", className:"", numara:"" });
    setFormAcik(false);
  }

  // Seçili öğrencinin verileri
  const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrP2 = profiles2.find(p => p.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim());
  const ogrDeneme = denemeler[seciliOgrenci] || {};
  const ogrRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === seciliOgrenci?.toLowerCase().trim() && !r.kapandi);
  const denemeGirilen = Object.entries(ogrDeneme).sort((a,b)=>a[0]-b[0]).map(([no,nets])=>({
    no:parseInt(no), nets,
    toplam: LGS_DERSLER.reduce((s,d)=>s+(parseFloat(nets[d.key])||0),0)
  }));
  const denemeAvg = denemeGirilen.length ? (denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1) : null;

  const siniflar = [...new Set(tumOgrenciler.map(o=>o.className).filter(Boolean))].sort();

  const gosterilecek = filtreliListe.filter(o =>
    sinifFiltre === "Tümü" || o.className === sinifFiltre
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>

      {/* ── SOL: Öğrenci Listesi ─────────────────────────────────── */}
      {!seciliOgrenci ? (
        <div>
          <div style={{ background:"#EEF2FF", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:BLUE, fontWeight:600 }}>
            👥 {tumOgrenciler.length} öğrenci kayıtlı · Seç veya yeni ekle
          </div>

          {/* Arama + Ekle */}
          <div style={{ display:"flex", gap:8, marginBottom:10 }}>
            <input placeholder="Ad, sınıf veya numara ara…" value={aramaMetni}
              onChange={e => setAramaMetni(e.target.value)}
              style={{ flex:1, padding:"9px 12px", border:`1px solid ${BORDER}`, borderRadius:10, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box" }} />
            <button onClick={() => setFormAcik(f=>!f)} style={{
              background:formAcik ? BORDER : ACCENT, color:formAcik ? MUTED : "#fff",
              border:"none", borderRadius:10, padding:"9px 14px", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
            }}>+ Yeni</button>
          </div>

          {/* Yeni öğrenci formu */}
          {formAcik && (
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:14, marginBottom:12 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                <div>
                  <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>AD SOYAD</label>
                  <input placeholder="Ad Soyad" value={yeniForm.studentName}
                    onChange={e => setYeniForm(f=>({...f, studentName:e.target.value}))}
                    style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>SINIF</label>
                  <input placeholder="8-A" value={yeniForm.className}
                    onChange={e => setYeniForm(f=>({...f, className:e.target.value}))}
                    style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
                </div>
              </div>
              <div style={{ marginBottom:10 }}>
                <label style={{ fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:3 }}>ÖĞRENCİ NUMARASI</label>
                <input placeholder="örn. 1234" value={yeniForm.numara}
                  onChange={e => setYeniForm(f=>({...f, numara:e.target.value}))}
                  style={{ width:"100%", padding:"8px 10px", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, boxSizing:"border-box" }} />
              </div>
              <button onClick={handleOgrenciEkle} disabled={!yeniForm.studentName.trim()} style={{
                width:"100%", padding:"10px", background:yeniForm.studentName ? ACCENT : BORDER,
                color:yeniForm.studentName ? "#fff" : MUTED, border:"none", borderRadius:10, fontSize:14, fontWeight:800, cursor:"pointer"
              }}>Kaydet ve Aç</button>
            </div>
          )}

          {/* Sınıf filtresi */}
          {siniflar.length > 0 && (
            <div style={{ display:"flex", gap:5, overflowX:"auto", marginBottom:10, paddingBottom:4 }}>
              {["Tümü", ...siniflar].map(s => (
                <button key={s} onClick={() => setSinifFiltre(s)} style={{
                  flexShrink:0, padding:"4px 10px", borderRadius:14,
                  border:`1px solid ${sinifFiltre===s ? ACCENT : BORDER}`,
                  background:sinifFiltre===s ? ACCENT_LIGHT : CARD,
                  color:sinifFiltre===s ? ACCENT : MUTED,
                  fontSize:11, fontWeight:sinifFiltre===s ? 700 : 500, cursor:"pointer"
                }}>{s}</button>
              ))}
            </div>
          )}

          {/* Öğrenci listesi */}
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {gosterilecek.length === 0 && (
              <div style={{ textAlign:"center", color:MUTED, marginTop:30, fontSize:13 }}>Sonuç bulunamadı</div>
            )}
            {gosterilecek.map(o => {
              const oRec = records.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim());
              const oP1 = profiles.find(p => p.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim());
              const oDen = Object.keys(denemeler[o.studentName] || {}).length;
              const oRsk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim() && !r.kapandi).length;
              const oDenAvg = oDen > 0 ? (Object.values(denemeler[o.studentName]||{}).reduce((s,nets)=>s+LGS_DERSLER.reduce((ss,d)=>ss+(parseFloat(nets[d.key])||0),0),0)/oDen).toFixed(1) : null;
              return (
                <div key={o.studentName} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:8 }}>
                  {/* Tıklanabilir alan */}
                  <div onClick={() => { setSeciliOgrenci(o.studentName); if(setAktifOgrenci) setAktifOgrenci({ name: o.studentName, className: o.className || "" }); }}
                    style={{ display:"flex", alignItems:"center", gap:10, flex:1, cursor:"pointer", minWidth:0 }}>
                    <div style={{ width:36, height:36, borderRadius:"50%", background:ACCENT_LIGHT, color:ACCENT, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:15, flexShrink:0 }}>
                      {o.studentName.charAt(0).toUpperCase()}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:700, fontSize:14, color:TEXT }}>{o.studentName}</div>
                      <div style={{ fontSize:11, color:MUTED }}>{o.className}{o.numara ? ` · No: ${o.numara}` : ""}</div>
                    </div>
                    <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                      {oRsk > 0 && <span style={{ background:"#FDECEA", color:"#C0392B", borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>⚠</span>}
                      {oRec.length > 0 && <span style={{ background:ACCENT_LIGHT, color:ACCENT, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>{oRec.length} görüşme</span>}
                      {oDenAvg && <span style={{ background:"#EEF2FF", color:BLUE, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>Ort:{oDenAvg}</span>}
                      {oP1 && <span style={{ background:ACCENT_LIGHT, color:ACCENT, borderRadius:12, padding:"2px 6px", fontSize:10, fontWeight:700 }}>P1</span>}
                    </div>
                    <span style={{ color:MUTED, fontSize:16, flexShrink:0 }}>›</span>
                  </div>
                  {/* Sil butonu */}
                  <SilButonu onSil={() => handleOgrenciSil(o.studentName)} />
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        /* ── SAĞ: Öğrenci Detay ──────────────────────────────── */
        <div>
          {/* Geri + Başlık */}
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <button onClick={() => { setSeciliOgrenci(null); setAktifSekme("ozet"); }} style={{
              background:BG, border:`1px solid ${BORDER}`, borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, color:MUTED, cursor:"pointer"
            }}>← Geri</button>
            <button onClick={() => handleOgrenciSil(seciliOgrenci)} style={{
              background:"none", border:"1px solid #F28B82", color:"#C5221F",
              borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer"
            }}>🗑 Öğrenciyi Sil</button>
            <button onClick={() => handleOgrenciSil(seciliOgrenci)} style={{
              background:"none", border:"1px solid #F28B82", color:"#C5221F", borderRadius:8, padding:"6px 10px", fontSize:11, fontWeight:700, cursor:"pointer"
            }}>🗑 Sil</button>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:800, fontSize:16, color:TEXT }}>{seciliOgrenci}</div>
              {(() => { const o = tumOgrenciler.find(x=>x.studentName===seciliOgrenci); return o ? <div style={{ fontSize:11, color:MUTED }}>{o.className}{o.numara ? ` · No: ${o.numara}` : ""}</div> : null; })()}
            </div>
            {ogrRisk.length > 0 && <span style={{ background:"#FDECEA", color:"#C0392B", borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:700 }}>⚠ Risk</span>}
            <button onClick={() => handleOgrenciSil(seciliOgrenci)} style={{ background:"none", border:"1px solid #F28B82", color:"#C5221F", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>🗑 Sil</button>
            <button onClick={() => {
              onRaporAc({
                ogrenci: seciliOgrenci,
                profil1: ogrP1 || null,
                profil2: ogrP2 || null,
                gorusmeler: ogrRec,
                denemeler: ogrDeneme
              });
            }} style={{ background:ACCENT, color:"#fff", border:"none", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:700, cursor:"pointer" }}>📄 Rapor</button>
          </div>

          {/* Alt sekmeler */}
          <div style={{ display:"flex", gap:4, marginBottom:14, borderBottom:`1px solid ${BORDER}`, paddingBottom:0 }}>
            {[
              { key:"ozet", label:"Özet" },
              { key:"gorusme", label:`Görüşme (${ogrRec.length})` },
              { key:"deneme", label:`Deneme (${Object.keys(ogrDeneme).length})` },
              { key:"profil", label:"Profil" },
            ].map(s => (
              <button key={s.key} onClick={() => setAktifSekme(s.key)} style={{
                padding:"8px 10px", border:"none", background:"none",
                color:aktifSekme===s.key ? ACCENT : MUTED,
                fontWeight:aktifSekme===s.key ? 700 : 500,
                fontSize:12, cursor:"pointer",
                borderBottom:aktifSekme===s.key ? `3px solid ${ACCENT}` : "3px solid transparent"
              }}>{s.label}</button>
            ))}
          </div>

          {/* ÖZET — Canlı Öğrenci Kartı */}
          {aktifSekme === "ozet" && (
            <OzetKarti
              ogrenci={seciliOgrenci}
              ogrRec={ogrRec}
              ogrP1={ogrP1}
              ogrP2={ogrP2}
              ogrRisk={ogrRisk}
              denemeGirilen={denemeGirilen}
              denemeAvg={denemeAvg}
              mudahalePlan={mudahalePlan || {}}
              hazirlikNotlari={hazirlikNotlari}
              setHazirlikNotlari={setHazirlikNotlari}
              ilerlemeNotlari={ilerlemeNotlari}
              setIlerlemeNotlari={setIlerlemeNotlari}
