<script>
  // Kullanıcının kendi Anthropic API anahtarını yönetir. Her müşteri kendi
  // anahtarını Ayarlar bölümünden girer; AI faturası doğrudan ona kesilir.
  // "rpusula__" ön ekiyle saklanan her anahtar otomatik olarak Firestore'a da
  // senkronize edilir (pdrSyncDown ile), böylece anahtar tarayıcıya değil hesaba bağlı olur.
  function pdrGetApiKey() {
    return localStorage.getItem("rpusula__apiKey") || "";
  }
  function pdrSetApiKey(key) {
    const trimmed = key.trim();
    localStorage.setItem("rpusula__apiKey", trimmed);
    const user = window.pdrAuth && window.pdrAuth.currentUser;
    if (user && window.pdrDb) {
      window.pdrDb.collection("users").doc(user.uid).collection("data").doc("apiKey")
        .set({ value: trimmed, updatedAt: Date.now() })
        .catch(err => console.log("API anahtarı buluta kaydedilemedi:", err));
    }
  }
  // Tüm AI çağrılarının geçtiği tek nokta. Eski Cloudflare Worker çağrılarının
  // yerini alır — { model, max_tokens, system, messages } aynı formatı kabul eder.
  async function pdrCallClaude(payload) {
    const apiKey = pdrGetApiKey();
    if (!apiKey) {
      throw new Error("API_KEY_MISSING");
    }
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error("API_ERROR: " + errText);
    }
    return res;
  }
</script>

<script>
// Firebase kurulumu
const firebaseConfig = {
  apiKey: "AIzaSyAhS-sfwpZa2zb8GKSqcvihLdrBMtPOCTQ",
  authDomain: "rehber-pusula.firebaseapp.com",
  projectId: "rehber-pusula",
  storageBucket: "rehber-pusula.firebasestorage.app",
  messagingSenderId: "880787609777",
  appId: "1:880787609777:web:2987584e47fc78a2fc2a90"
};
firebase.initializeApp(firebaseConfig);
const pdrAuth = firebase.auth();
const pdrDb = firebase.firestore();
window.pdrAuth = pdrAuth;
window.pdrDb = pdrDb;

let pdrResolveReady;
window.__pdrAuthReady = new Promise((res) => { pdrResolveReady = res; });

// Farklı bir kullanıcı giriş yaptığında önceki kullanıcının önbellek
// verilerinin görünmemesi için, önce yerel "rpusula__" anahtarlarını temizleriz.
function pdrClearLocalCache() {
  const toRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("rpusula__")) toRemove.push(k);
  }
  toRemove.forEach((k) => localStorage.removeItem(k));
}

async function pdrSyncDown(uid) {
  const lastUid = localStorage.getItem("pdr_last_uid");
  if (lastUid && lastUid !== uid) {
    // Cihazda önceden başka bir hesap açılmış — eski veriler karışmasın diye temizle.
    pdrClearLocalCache();
  }
  localStorage.setItem("pdr_last_uid", uid);
  try {
    const snap = await pdrDb.collection("users").doc(uid).collection("data").get();
    snap.forEach((doc) => {
      const d = doc.data();
      if (d && typeof d.value === "string") {
        localStorage.setItem("rpusula__" + doc.id, d.value);
      }
    });
  } catch (e) { console.log("Firestore indirme hatası:", e); }
}

const pdrLoginOverlay = document.getElementById("pdr-login-overlay");
const pdrLoginForm = document.getElementById("pdr-login-form");
const pdrLoginError = document.getElementById("pdr-login-error");
const pdrLoginInfo = document.getElementById("pdr-login-info");
const pdrLoginBtn = document.getElementById("pdr-login-btn");
const pdrLoginTitle = document.getElementById("pdr-login-title");
const pdrToggleMode = document.getElementById("pdr-toggle-mode");
const pdrPass2 = document.getElementById("pdr-login-pass2");
const pdrLogoutBtn = document.getElementById("pdr-logout-btn");
const pdrForgotPass = document.getElementById("pdr-forgot-pass");
let pdrIsRegisterMode = false;

if (pdrForgotPass) {
  pdrForgotPass.addEventListener("click", async (e) => {
    e.preventDefault();
    if (pdrLoginError) pdrLoginError.textContent = "";
    if (pdrLoginInfo) pdrLoginInfo.textContent = "";
    const email = document.getElementById("pdr-login-email").value.trim();
    if (!email) {
      if (pdrLoginError) pdrLoginError.textContent = "Önce e-posta adresinizi yukarıya yazın.";
      return;
    }
    try {
      await pdrAuth.sendPasswordResetEmail(email);
      if (pdrLoginInfo) pdrLoginInfo.textContent = "Şifre sıfırlama bağlantısı e-postanıza gönderildi. Gelen kutunuzu (ve gereksiz/spam klasörünü) kontrol edin.";
    } catch (err) {
      let msg = "Bir hata oluştu, tekrar deneyin.";
      if (err && err.code === "auth/user-not-found") msg = "Bu e-posta ile kayıtlı bir hesap bulunamadı.";
      if (err && err.code === "auth/invalid-email") msg = "Geçersiz e-posta adresi.";
      if (pdrLoginError) pdrLoginError.textContent = msg;
    }
  });
}

if (pdrToggleMode) {
  pdrToggleMode.addEventListener("click", (e) => {
    e.preventDefault();
    pdrIsRegisterMode = !pdrIsRegisterMode;
    if (pdrIsRegisterMode) {
      pdrLoginTitle.textContent = "📝 Kayıt Ol";
      pdrLoginBtn.textContent = "Kayıt Ol";
      pdrPass2.style.display = "block";
      pdrPass2.required = true;
      pdrToggleMode.textContent = "Zaten hesabınız var mı? Giriş yapın";
    } else {
      pdrLoginTitle.textContent = "🔒 Giriş Yap";
      pdrLoginBtn.textContent = "Giriş Yap";
      pdrPass2.style.display = "none";
      pdrPass2.required = false;
      pdrToggleMode.textContent = "Hesabınız yok mu? Kayıt olun";
    }
    if (pdrLoginError) pdrLoginError.textContent = "";
  });
}

if (pdrLogoutBtn) {
  pdrLogoutBtn.addEventListener("click", async () => {
    await pdrAuth.signOut();
    pdrClearLocalCache();
    localStorage.removeItem("pdr_last_uid");
    location.reload();
  });
}

let pdrFirstReady = true;
pdrAuth.onAuthStateChanged(async (user) => {
  const splashEl = document.getElementById("splash");
  if (user) {
    if (pdrLoginOverlay) pdrLoginOverlay.style.display = "none";
    if (pdrLogoutBtn) pdrLogoutBtn.style.display = "block";
    await pdrSyncDown(user.uid);
    if (pdrFirstReady) { pdrFirstReady = false; pdrResolveReady(user); }
  } else {
    if (splashEl) splashEl.className = "hide";
    if (pdrLoginOverlay) pdrLoginOverlay.style.display = "flex";
    if (pdrLogoutBtn) pdrLogoutBtn.style.display = "none";
  }
});

if (pdrLoginForm) {
  pdrLoginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("pdr-login-email").value.trim();
    const pass = document.getElementById("pdr-login-pass").value;
    const pass2 = pdrPass2.value;
    if (pdrLoginError) pdrLoginError.textContent = "";

    if (pdrIsRegisterMode) {
      if (pass.length < 6) {
        pdrLoginError.textContent = "Şifre en az 6 karakter olmalı.";
        return;
      }
      if (pass !== pass2) {
        pdrLoginError.textContent = "Şifreler eşleşmiyor.";
        return;
      }
    }

    pdrLoginBtn.disabled = true;
    pdrLoginBtn.textContent = pdrIsRegisterMode ? "Kayıt olunuyor..." : "Giriş yapılıyor...";
    try {
      if (pdrIsRegisterMode) {
        await pdrAuth.createUserWithEmailAndPassword(email, pass);
      } else {
        await pdrAuth.signInWithEmailAndPassword(email, pass);
      }
    } catch (err) {
      let msg = pdrIsRegisterMode ? "Kayıt başarısız." : "Giriş başarısız: e-posta veya şifre hatalı.";
      if (err && err.code === "auth/email-already-in-use") msg = "Bu e-posta zaten kayıtlı. Giriş yapmayı deneyin.";
      if (err && err.code === "auth/weak-password") msg = "Şifre çok zayıf, en az 6 karakter kullanın.";
      if (err && err.code === "auth/invalid-email") msg = "Geçersiz e-posta adresi.";
      if (pdrLoginError) pdrLoginError.textContent = msg;
    }
    pdrLoginBtn.disabled = false;
    pdrLoginBtn.textContent = pdrIsRegisterMode ? "Kayıt Ol" : "Giriş Yap";
  });
}

// Service Worker kaydı
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("SW registered"))
      .catch(err => console.log("SW error:", err));
  });
}

// Storage API — localStorage tabanlı + Firestore bulut senkronizasyonu
window.storage = {
  get: async (key) => {
    try {
      const v = localStorage.getItem("rpusula__" + key);
      return v ? { key, value: v } : null;
    } catch { return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem("rpusula__" + key, value);
      const user = pdrAuth.currentUser;
      if (user) {
        pdrDb.collection("users").doc(user.uid).collection("data").doc(key)
          .set({ value, updatedAt: Date.now() })
          .catch(err => console.log("Firestore yazma hatası:", err));
      }
      return { key, value };
    } catch { return null; }
  },
  delete: async (key) => {
    localStorage.removeItem("rpusula__" + key);
    const user = pdrAuth.currentUser;
    if (user) {
      pdrDb.collection("users").doc(user.uid).collection("data").doc(key)
        .delete().catch(() => {});
    }
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("rpusula__" + (prefix || ""))) {
        keys.push(k.replace("rpusula__", ""));
      }
    }
    return { keys };
  }
};
</script>

  const res = await pdrCallClaude({

      model: "claude-sonnet-4-6", max_tokens: 200,
      system: "Sen 20 yillik klinik deneyime sahip PDR uzmani Dr. Ayse Kara'sin. Gorusme notlarini analiz edip SADECE JSON formatinda puan dondur. Baska hicbir sey yazma.",

// Kapasite kontrolü
async function storageKapasite() {
  try {
    let total = 0;
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith("rpusula__")) total += (localStorage.getItem(k)||"").length * 2;
    }
    const mb = (total/1024/1024).toFixed(2);
    return { used: parseFloat(mb), limit: 5, yuzde: Math.round((parseFloat(mb)/5)*100) };
  } catch { return { used:0, limit:5, yuzde:0 }; }
}

// Büyük array'leri chunk'lara böl (görüşme notları için)
async function saveChunked(baseKey, items) {
  const CHUNK = 150; // 150 kayıt/chunk — daha az storage yazma
  if (items.length <= CHUNK) {
    await window.storage.set(baseKey, JSON.stringify(items));
    await window.storage.delete(baseKey + "-meta");
    return;
  }
  const chunkCount = Math.ceil(items.length/CHUNK);
  await window.storage.set(baseKey + "-meta", JSON.stringify({ chunks: chunkCount }));
  for (let i=0; i<chunkCount; i++) {
    await window.storage.set(baseKey + "-c" + i, JSON.stringify(items.slice(i*CHUNK, (i+1)*CHUNK)));
  }
}

async function loadChunked(baseKey) {
  try {
    const meta = await window.storage.get(baseKey + "-meta");
    if (!meta) {
      const r = await window.storage.get(baseKey);
      return r ? JSON.parse(r.value) : [];
    }
    const { chunks } = JSON.parse(meta.value);
    let all = [];
    for (let i=0; i<chunks; i++) {
      const c = await window.storage.get(baseKey + "-c" + i);
      if (c) all = all.concat(JSON.parse(c.value));
    }
    return all;
  } catch { return []; }
}

const DEG_SECENEKLER = [
  { val: 1, label: "Çok Düşük" }, { val: 2, label: "Düşük" },
  { val: 3, label: "Orta" }, { val: 4, label: "İyi" }, { val: 5, label: "Çok İyi" },
];

function degBoyutPuan(cevaplar, key) {
  const vals = Object.values(cevaplar[key] || {});
  if (!vals.length) return null;
  return parseFloat((vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1));
}
function degTumPuanlar(cevaplar) {
  const p = {};
  DEG_SORULAR.forEach(b => { const v = degBoyutPuan(cevaplar, b.key); if (v !== null) p[b.key] = v; });
  return p;
}
function degTamamlanma(cevaplar) {
  let total = 0, done = 0;
  DEG_SORULAR.forEach(b => { b.sorular.forEach((_, i) => { total++; if (cevaplar[b.key]?.[i] !== undefined) done++; }); });
  return Math.round((done / total) * 100);
}

async function pdfMetinCikar(file) {
  // PDF'i base64'e çevir
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(",")[1];
      try {
        const res = await pdrCallClaude({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            system: `Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin.

GOREV - PDF ANALIZI: Yuklenen belgeden cikar:
1. KAYNAK BİLGİSİ: Yazar, başlık, yıl (varsa)
2. ANA TEMALAR: Belgede işlenen başlıca konular (madde madde)
3. PDR AÇISINDAN ÖNEMLİ NOKTALAR: Okul psikolojik danışmanlığı için kullanılabilecek teori, model veya yaklaşımlar
4. ANAHTAR KAVRAMLAR: Önemli terimler ve kısa açıklamaları

Maksimum 400 kelime. Sade ve yapılandırılmış yaz. JSON veya markdown kullanma.`,
            messages: [{
              role: "user",
              content: [
                { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
                { type: "text", text: "Bu belgeyi PDR perspektifinden analiz et ve özetle." }
              ]
            }]
          });
        const data = await res.json();
        resolve(data.content?.[0]?.text || "Metin çıkarılamadı.");
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function getDegerlendirmeAnalysis(studentName, className, cevaplar, notlar) {
  const boyutMetni = DEG_SORULAR.map(b => {
    const bC = cevaplar[b.key] || {};
    const sorular = b.sorular.map((s, i) => `  - ${s}: ${bC[i] !== undefined ? DEG_SECENEKLER.find(x => x.val === bC[i])?.label : "Yanıtlanmadı"}`).join("\n");
    return `${DIMENSIONS.find(d => d.key === b.key)?.label || b.key}:\n${sorular}${notlar[b.key] ? `\n  Not: ${notlar[b.key]}` : ""}`;
  }).join("\n\n");
  const puanOzet = DEG_SORULAR.map(b => {
    const p = degBoyutPuan(cevaplar, b.key);
    return `${DIMENSIONS.find(d => d.key === b.key)?.label}: ${p ?? "?"}/5`;
  }).join(", ");

  const res = await pdrCallClaude({
      model: "claude-sonnet-4-6", max_tokens: 2000,
      system: `Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin.

DEGERLENDIRME CERCEVESI:

BOYUT-TEORİ EŞLEŞTİRMESİ:
- Akademik Gelişim → Bandura öz-yeterlilik, Vygotsky yakınsak gelişim alanı
- Sosyal Beceriler → Goleman duygusal zeka, Sosyal öğrenme teorisi
- Duygusal Denge → Gross duygu düzenleme, Lazarus stres-başa çıkma
- Aile İlişkileri → Bowlby bağlanma teorisi, Bronfenbrenner ekolojik sistem
- Öz Güven → Adler bireysel psikoloji, Maslow ihtiyaçlar hiyerarşisi
- Okul Uyumu → MEB rehberlik yönergesi, Ekosistem uyum modeli
- Kariyer Farkındalığı → Super kariyer gelişim, Holland RIASEC modeli
- Akran İlişkileri → Sullivan kişilerarası teori, Moreno sosyometri

MEB OKUL REHBERLİK ÇERÇEVESİ: Bireysel farkındalık, sosyal-duygusal öğrenme, akademik gelişim, kariyer gelişimi, aile-çevre ilişkileri kazanımları.

Analiz yaparken: Her boyutu ilgili teorik çerçeveden yorumla, hangi teoriden baktığını belirt, MEB kazanımlarına atıfta bulun, pratik ve uygulanabilir öneriler ver. Markdown veya JSON kullanma.`,
      messages: [{ role: "user", content: `Öğrenci: ${studentName}${className ? `, Sınıf: ${className}` : ""}\nPuan Özeti: ${puanOzet}\n\n${boyutMetni}\n\nBu öğrencinin PDR analizini şu yapıda yaz:\nGENEL DEĞERLENDİRME: (öğrencinin genel profilini teorik perspektiften 2-3 cümle)\nGÜÇLÜ YÖNLER: (hangi teoriye göre güçlü olduğunu belirt)\nGELİŞİM ALANLARI: (hangi teorik çerçeveden müdahale önerilebileceğini belirt)\nÖNERİLER: (teorik temelli 3 somut öneri, kaynağını belirt)\nRİSK NOTU: (varsa teorik dayanaklı risk değerlendirmesi)` }],
    });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

// ── Rapor İndirme Yardımcısı (mobil uyumlu) ────────────────────────────────────
async function raporIndir(elementId, dosyaAdi) {
  const el = document.getElementById(elementId);
  if (!el) { alert("Rapor bulunamadı."); return; }

  // Rapor içeriğini al
  const icerik = el.innerHTML;
  const htmlStr = `<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${dosyaAdi}</title>
<style>
  @page { size: A4; margin: 8mm; }
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #1a1a1a; background: #fff; padding: 0; margin: 0; }
  @media print {
    .noprint { display: none !important; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; margin-top: 0 !important; }
    #pdr-print-spacer { margin-top: 0 !important; }
  }
  @media screen {
    body { padding: 16px; max-width: 1100px; margin: 0 auto; }
  }
  table { width: 100%; border-collapse: collapse; }
  svg { max-width: 100%; }
</style>
</head>
<body>
<div class="noprint" style="position:fixed;top:0;left:0;right:0;background:#2D6A4F;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:999;font-family:Arial,sans-serif;">
  <span style="font-weight:700;font-size:15px;">📄 ${dosyaAdi}</span>
  <div style="display:flex;gap:10px;">
    <button onclick="window.print()" style="background:#fff;color:#2D6A4F;border:none;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:800;cursor:pointer;">🖨️ Yazdır / PDF Kaydet</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;">✕</button>
  </div>
</div>
<div id="pdr-print-spacer" style="margin-top:60px;">${icerik}</div>
</body>
</html>`;

  const isMobil = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

  if (isMobil) {
    // Mobilde: dosya indirmek yerine doğrudan aynı sekmede aç (dosya yöneticisine gitmeye gerek kalmaz)
    try {
      const blob = new Blob([htmlStr], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      window.location.href = url;
      return;
    } catch(e) {}
  } else {
    // Masaüstü: Yeni sekme
    try {
      const w = window.open("", "_blank");
      if (w && !w.closed) {
        w.document.open();
        w.document.write(htmlStr);
        w.document.close();
        return;
      }
    } catch(e) {}
  }

  // Yöntem 2: Blob + link (yedek)
  try {
    const blob = new Blob([htmlStr], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = dosyaAdi + ".html";
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
    return;
  } catch(e) {}

  // Yöntem 3: Data URI (son çare)
  try {
    const encoded = encodeURIComponent(htmlStr);
    window.location.href = "data:text/html;charset=utf-8," + encoded;
  } catch(e) {
    alert("PDF indirilemedi. Ekran görüntüsü alabilirsiniz.");
  }
}

// ── Excel Export ──────────────────────────────────────────────────────────────// ── Excel Export ──────────────────────────────────────────────────────────────
function exportToExcel(records) {
  const data = records.map(r => ({
    "Tarih": r.date, "Öğrenci": r.studentName, "Sınıf": r.className || "",
    "Görüşme Türü": r.meetingType || "Öğrenci", "Konu": r.topic || "", "Özet": r.summary,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{ wch: 12 }, { wch: 22 }, { wch: 8 }, { wch: 14 }, { wch: 18 }, { wch: 60 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Görüşme Kayıtları");
  const topicCount = {}, typeCount = { "Öğrenci": 0, "Veli": 0 };
  const studentSet = new Set(), parentSet = new Set(), monthCount = {};
  records.forEach(r => {
    const topic = r.topic || "Belirtilmemiş"; topicCount[topic] = (topicCount[topic] || 0) + 1;
    const type = r.meetingType || "Öğrenci"; typeCount[type] = (typeCount[type] || 0) + 1;
    if (type === "Öğrenci") studentSet.add(r.studentName); else parentSet.add(r.studentName);
    const parts = r.date?.split(".");
    if (parts?.length === 3) { const key = `${parts[1]}/${parts[2]}`; monthCount[key] = (monthCount[key] || 0) + 1; }
  });
  const statRows = [
    ["PDR SERVİSİ — GÖRÜŞME İSTATİSTİKLERİ"], [],
    ["GENEL"], ["Toplam Görüşme", records.length],
    ["Farklı Öğrenci Sayısı", studentSet.size], ["Farklı Veli Sayısı", parentSet.size], [],
    ["GÖRÜŞME TÜRÜ"], ["Öğrenci Görüşmesi", typeCount["Öğrenci"] || 0], ["Veli Görüşmesi", typeCount["Veli"] || 0], [],
    ["KONULARA GÖRE"], ...Object.entries(topicCount).sort((a, b) => b[1] - a[1]).map(([k, v]) => [k, v]), [],
    ["AYLARA GÖRE"], ...Object.entries(monthCount).sort().map(([k, v]) => [k, v]),
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(statRows);
  ws2["!cols"] = [{ wch: 28 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws2, "İstatistikler");
  XLSX.writeFile(wb, `PDR_Kayitlar_${today().replace(/\./g, "-")}.xlsx`);
}

// ── Radar SVG ─────────────────────────────────────────────────────────────────
function RadarChart({ scores, size = 240, glass = false }) {
  const pad = size * 0.30; // Etiketler için ekstra kenar boşluğu
  const total = size + pad * 2;
  const cx = total / 2, cy = total / 2, r = size * 0.34, n = DIMENSIONS.length;
  const angleStep = (2 * Math.PI) / n;
  const getPoint = (i, val, maxVal = 5) => {
    const angle = i * angleStep - Math.PI / 2;
    const dist = (val / maxVal) * r;
    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
  };
  const dataPoints = DIMENSIONS.map((d, i) => getPoint(i, scores[d.key] || 0));
  const gridLevels = [1, 2, 3, 4, 5];
  const gid = "radarFillGrad" + size + (glass ? "g" : "");
  const gridColor = glass ? "rgba(255,255,255,0.35)" : "#EEF3F0";
  const gridColorOuter = glass ? "rgba(255,255,255,0.55)" : BORDER;
  const axisColor = glass ? "rgba(255,255,255,0.3)" : BORDER;
  const fillColor = glass ? "#ffffff" : ACCENT;
  const labelColor = glass ? "#ffffff" : TEXT;

  return (
    <svg width="100%" height="auto" style={{ maxWidth: total, display: "block" }} viewBox={`0 0 ${total} ${total}`}>
      <defs>
        <radialGradient id={gid} cx="50%" cy="45%" r="60%">
          <stop offset="0%" stopColor={fillColor} stopOpacity={glass ? 0.5 : 0.6} />
          <stop offset="100%" stopColor={fillColor} stopOpacity={glass ? 0.12 : 0.15} />
        </radialGradient>
        <filter id={"radarGlow" + size + (glass ? "g" : "")} x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" floodColor={glass ? "#000000" : ACCENT} floodOpacity={glass ? 0.25 : 0.4} />
        </filter>
      </defs>
      {/* Grid */}
      {gridLevels.map(level => {
        const pts = DIMENSIONS.map((_, i) => getPoint(i, level));
        return <polygon key={level} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
          fill="none" stroke={level === 5 ? gridColorOuter : gridColor} strokeWidth={level === 5 ? 1.4 : 1} />;
      })}
      {/* Axes */}
      {DIMENSIONS.map((_, i) => {
        const outer = getPoint(i, 5);
        return <line key={i} x1={cx} y1={cy} x2={outer.x} y2={outer.y} stroke={axisColor} strokeWidth={1} />;
      })}
      {/* Data: gradyanlı dolgu + parlaklık gölgesi */}
      <polygon points={dataPoints.map(p => `${p.x},${p.y}`).join(" ")}
        fill={`url(#${gid})`} filter={`url(#radarGlow${size}${glass ? "g" : ""})`} stroke={fillColor} strokeWidth={2.5} strokeLinejoin="round" />
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={5} fill={glass ? "#fff" : DIMENSIONS[i].color} stroke={glass ? ACCENT : "#fff"} strokeWidth={2} />
      ))}
      {/* Labels: her boyut kendi rengiyle, seçili etiketler ortalı */}
      {DIMENSIONS.map((d, i) => {
        const angle = i * angleStep - Math.PI / 2;
        const cosA = Math.cos(angle), sinA = Math.sin(angle);
        const lx = cx + (r + size * 0.16) * cosA;
        const ly = cy + (r + size * 0.16) * sinA;
        const ortalanacak = d.key === "kariyer" || d.key === "duygusal";
        const anchor = ortalanacak ? "middle" : (Math.abs(cosA) < 0.3 ? "middle" : (cosA > 0 ? "start" : "end"));
        const etiketRengi = glass && d.color === ACCENT ? ACCENT_LIGHT : d.color;
        return (
          <text key={i} x={lx} y={ly} textAnchor={anchor} dominantBaseline="middle"
            fontSize={size * 0.052} fill={etiketRengi} fontWeight={800}>
            {d.label.split(" ").map((w, wi) => (
              <tspan key={wi} x={lx} dy={wi === 0 ? 0 : size * 0.06}>{w}</tspan>
            ))}
          </text>
        );
      })}
    </svg>
  );
}

    return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
  };
  const ort = dersOrtalama();
  return (
    <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, marginBottom: 10, overflow: "hidden" }}>
      <div onClick={() => setOpen(o => !o)} style={{
        display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", cursor: "pointer",
        borderBottom: open ? `1px solid ${BORDER}` : "none"
      }}>
        <div style={{
          width: 36, height: 36, borderRadius: "50%", background: "#EEF2FF", color: BLUE,
          display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 15
        }}>{p.studentName.charAt(0).toUpperCase()}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: TEXT }}>{p.studentName}</div>
          <div style={{ fontSize: 12, color: MUTED }}>{p.date} · {p.className}</div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {ort && <span style={{ background: BLUE, color:"#fff", borderRadius: 20, padding: "2px 10px", fontSize: 12, fontWeight: 800 }}>Ort: {ort}</span>}
          {p.ilgiler?.length > 0 && <span style={{ background: "#FEF9C3", color:"#92400E", borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>{p.ilgiler.length} ilgi</span>}
        </div>
        <span style={{ color: MUTED, fontSize: 18 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ padding: 16 }}>
          {/* Sınav Puanları */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Sınav Puanları</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {DERSLER.map(d => {
                const val = parseFloat(p.sinavlar?.[d.key]);
                if (!p.sinavlar?.[d.key] && p.sinavlar?.[d.key] !== 0) return null;
                const pct = Math.min(100, (val / 100) * 100);
                return (
                  <div key={d.key} style={{ background: BG, borderRadius: 8, padding: "8px 10px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 11, color: TEXT, fontWeight: 600 }}>{d.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 800, color: d.color }}>{val}</span>
                    </div>
                    <div style={{ height: 4, background: BORDER, borderRadius: 3 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: d.color, borderRadius: 3 }} />
                    </div>
                  </div>
                );
              })}
            </div>
            {ort && <div style={{ marginTop: 8, textAlign: "right", fontSize: 13, color: BLUE, fontWeight: 700 }}>Genel Ortalama: {ort}</div>}
          </div>

          {/* İlgi Alanları */}
          {p.ilgiler?.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Kişisel Gelişim & İlgi Profili</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {p.ilgiler.map(ilgi => (
                  <span key={ilgi} style={{ background: "#FEF9C3", color: "#92400E", borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 600 }}>{ilgi}</span>
                ))}
              </div>
              {p.ilgiNot && <div style={{ marginTop: 8, fontSize: 12, color: MUTED, lineHeight: 1.6 }}>{p.ilgiNot}</div>}
            </div>
          )}

          {/* D2 Dikkat Testi */}
          {p.d2 && (p.d2.TN || p.d2.TN_E) && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: PURPLE, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>D2 Dikkat Testi</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
                {[
                  { label: "TN", val: p.d2.TN, acik: "Psikomotor hız" },
                  { label: "E1", val: p.d2.E1, acik: "Seçici dikkat" },
                  { label: "E2", val: p.d2.E2, acik: "Öğrenme güçlüğü" },
                  { label: "CP", val: p.d2.CP, acik: "Perf. kalitesi" },
                  { label: "FR", val: p.d2.FR, acik: "Hız salınımı" },
                  { label: "PR", val: p.d2.PR, acik: "Yüzdelik" },
                ].filter(x => x.val).map(x => (
                  <div key={x.label} style={{ background: "#F3F0FF", borderRadius: 8, padding: "6px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 15, fontWeight: 800, color: PURPLE }}>{x.val}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>{x.label}</div>
                    <div style={{ fontSize: 9, color: MUTED }}>{x.acik}</div>
                  </div>
                ))}
              </div>
              {(p.d2.TN_E || p.d2.E_yuzde) && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
                  {p.d2.TN_E && <div style={{ background: "#EDE9FF", borderRadius: 8, padding: "8px", textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: PURPLE }}>{p.d2.TN_E}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>TN-E</div>
                    <div style={{ fontSize: 9, color: MUTED }}>Test Performansı</div>
                  </div>}
                  {p.d2.E_yuzde && <div style={{ background: "#EDE9FF", borderRadius: 8, padding: "8px", textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: PURPLE }}>%{p.d2.E_yuzde}</div>
                    <div style={{ fontSize: 10, color: PURPLE, fontWeight: 700 }}>E%</div>
                    <div style={{ fontSize: 9, color: MUTED }}>Hata Oranı</div>
                  </div>}
                </div>
              )}
              {p.d2.PR && (
                <div style={{ background: (() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "#E6F5EE" : pr >= 70 ? "#EEF2FF" : pr >= 60 ? "#FDF6E3" : "#FDECEA"; })(), borderRadius: 8, padding: "6px 10px", marginBottom: 6, fontSize: 12, fontWeight: 700, color: (() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "#1A8C5B" : pr >= 70 ? "#3B4FD8" : pr >= 60 ? "#B07D1A" : "#C0392B"; })() }}>
                  TN-E → PR {p.d2.PR} — {(() => { const pr = parseFloat(p.d2.PR); return pr >= 85 ? "İYİ (≥85)" : pr >= 70 ? "NORMAL (70-85)" : pr >= 60 ? "VASAT (60-70)" : "AVERAJ (50-60)"; })()}
                </div>
              )}
              {p.d2.E_yuzde && (
                <div style={{ borderRadius: 8, padding: "8px 12px", marginBottom: 6, border: "2px solid", ...(() => {
                  const e = parseFloat(p.d2.E_yuzde);
                  if (e <= 1.5) return { background: "#E6F5EE", borderColor: "#1A8C5B", color: "#1A8C5B" };
                  if (e <= 2.5) return { background: "#FDF6E3", borderColor: "#B07D1A", color: "#B07D1A" };
                  return { background: "#FDECEA", borderColor: "#C0392B", color: "#C0392B" };
                })() }}>
                  <span style={{ fontSize: 13, fontWeight: 800 }}>E = {p.d2.E_yuzde}% → </span>
                  <span style={{ fontSize: 12 }}>{(() => {
                    const e = parseFloat(p.d2.E_yuzde);
                    if (e <= 1.5) return "NORMAL (0–1,5)";
                    if (e <= 2.5) return "DİKKAT EDİLMELİ (1,5–2,5)";
                    return "DİKKAT PROBLEMİ (2,5+)";
                  })()}</span>
                </div>
              )}
              {p.d2.yorum && <div style={{ fontSize: 12, color: TEXT, background: "#F3F0FF", borderRadius: 8, padding: "8px 10px", lineHeight: 1.6 }}>{p.d2.yorum}</div>}
              {p.d2_analiz && <div style={{ fontSize: 12, color: TEXT, background: "#EDE9FF", borderRadius: 8, padding: "10px", lineHeight: 1.7, marginTop: 6, whiteSpace: "pre-wrap" }}>{p.d2_analiz}</div>}
            </div>
          )}

          {/* Kariyer Hedef */}
          {p.kariyer_hedef && (
            <div style={{ marginBottom: 10, background: "#F0FAF4", borderRadius: 8, padding: "8px 12px" }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: ACCENT }}>Kariyer Hedefi: </span>
              <span style={{ fontSize: 13, color: TEXT }}>{p.kariyer_hedef}</span>
            </div>
          )}

          {/* Aile Notu */}
          {p.aile_notu && (
            <div style={{ marginBottom: 10, fontSize: 12, color: MUTED, lineHeight: 1.6 }}>
              <span style={{ fontWeight: 700 }}>Aile Notu: </span>{p.aile_notu}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <button onClick={() => onDelete(p.id)} style={{ background: "none", border: "1px solid #F28B82", color: "#C5221F", borderRadius: 8, padding: "4px 14px", fontSize: 12, cursor: "pointer" }}>Sil</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Müdahale Planı Bileşeni ───────────────────────────────────────────────────
function MudahalePlanEkrani({ kayitliListesi, aktifOgrenci, mudahalePlan, setMudahalePlan, records }) {
  const [seciliAd, setSeciliAd] = useState(aktifOgrenci?.name || "");
  const [aramaMetni, setAramaMetni] = useState("");
  const [form, setForm] = useState({ hedef:"", adimlar:"", sorumlu:"pdr", sure:"", oncelik:"Orta", durum:"Devam Ediyor" });
  const [aiLoading, setAiLoading] = useState(false);
  const [kaydedildi, setKaydedildi] = useState(false);

  useEffect(() => { if (aktifOgrenci?.name) setSeciliAd(aktifOgrenci.name); }, [aktifOgrenci?.name]);

  const ogrPlanlar = (mudahalePlan[seciliAd] || []).sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
  const ogrRec = records.filter(r => r.studentName?.toLowerCase().trim() === seciliAd?.toLowerCase().trim());

  async function handleAiPlan() {
    if (!seciliAd) return;
    setAiLoading(true);
    const notlar = ogrRec.map((r,i) => `Görüşme ${i+1} (${r.date}): ${r.summary}`).join("\n\n");
    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:1500,
        system:"Sen Dr. Ayse Kara'sin — 20 yillik klinik PDR uzmanisin. BDT ve varoluşçu perspektiften somut müdahale plani olusturursun.",
        messages:[{role:"user", content:`Öğrenci: ${seciliAd}

Görüşme Notları:
${notlar||"Henüz görüşme notu yok."}

Bu öğrenci için somut bir PDR müdahale planı oluştur:

HEDEF: (tek cümle, ölçülebilir)
MÜDAHALE ADIMLARI:
1.
2.
3.
SÜRE: (kaç hafta/ay)
KONTROL KRİTERİ: (nasıl değerlendireceğiz)

Sade yaz, Markdown kullanma.`}]
      });
    const data = await res.json();
    const analiz = data.content?.[0]?.text || "";
    const hedefMatch = analiz.match(/HEDEF:\s*(.+)/);
    const adimlarMatch = analiz.match(/MÜDAHALE ADIMLARI:\s*([\s\S]+?)SÜRE:/);
    const sureMatch = analiz.match(/SÜRE:\s*(.+)/);
    setForm(f => ({
      ...f,
      hedef: hedefMatch ? hedefMatch[1].trim() : f.hedef,
      adimlar: adimlarMatch ? adimlarMatch[1].trim() : analiz,
      sure: sureMatch ? sureMatch[1].trim() : f.sure
    }));
    setAiLoading(false);
  }

  async function handleKaydet() {
    if (!seciliAd || !form.hedef.trim()) return;
    const yeni = { id: uid(), tarih: today(), ogrenci: seciliAd, ...form };
    const updated = { ...mudahalePlan, [seciliAd]: [yeni, ...(mudahalePlan[seciliAd]||[])] };
    setMudahalePlan(updated);
    await saveMudahalePlan(updated);
    setForm({ hedef:"", adimlar:"", sorumlu:"pdr", sure:"", oncelik:"Orta", durum:"Devam Ediyor" });
    setKaydedildi(true); setTimeout(() => setKaydedildi(false), 2000);
  }

  async function handleDurumGuncelle(ogrenci, id, durum) {
    const updated = { ...mudahalePlan, [ogrenci]: (mudahalePlan[ogrenci]||[]).map(p => p.id===id ? {...p, durum} : p) };
    setMudahalePlan(updated);
    await saveMudahalePlan(updated);
  }

  const inp = { width:"100%", padding:"9px 11px", border:`1px solid ${BORDER}`, borderRadius:9, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:4, textTransform:"uppercase" };
  const durumRenk = { "Devam Ediyor":["#1A8C5B","#E6F5EE"], "Tamamlandı":["#457B9D","#EEF2FF"], "Askıda":["#B07D1A","#FDF6E3"] };

  return (
    <div>
      <div style={{background:"#EEF2FF",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#3B4FD8",fontWeight:600}}>
        🎯 Müdahale Planı — Hedef, adımlar ve süre takibi
      </div>

      {/* Öğrenci seç */}
      <input placeholder="Öğrenci ara..." value={aramaMetni} onChange={e=>setAramaMetni(e.target.value)} style={{...inp, marginBottom:8}} />
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
        {kayitliListesi.filter(o=>o.name.toLowerCase().includes(aramaMetni.toLowerCase())).slice(0,15).map(o=>{
          const s=seciliAd===o.name;
          return <button key={o.name} onClick={()=>setSeciliAd(o.name)} style={{padding:"4px 10px",borderRadius:16,border:`2px solid ${s?ACCENT:BORDER}`,background:s?ACCENT_LIGHT:CARD,color:s?ACCENT:MUTED,fontSize:11,fontWeight:s?700:500,cursor:"pointer"}}>{o.name}</button>;
        })}
      </div>

      {seciliAd && (
        <>
          {/* Yeni plan formu */}
          <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:TEXT,marginBottom:10}}>Yeni Müdahale Planı — {seciliAd}</div>

            <button onClick={handleAiPlan} disabled={aiLoading} style={{width:"100%",padding:"10px",background:aiLoading?BORDER:PURPLE,color:aiLoading?"#666":"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12}}>
              {aiLoading?"⏳ AI plan oluşturuyor...":"✦ AI Müdahale Planı Oluştur"}
            </button>

            <label style={lbl}>HEDEF (ölçülebilir)</label>
            <input placeholder="örn. 3 haftada sınav kaygısını yönetebilir hale gelme" value={form.hedef} onChange={e=>setForm(f=>({...f,hedef:e.target.value}))} style={{...inp,marginBottom:10}} />

            <label style={lbl}>MÜDAHALE ADIMLARI</label>
            <textarea placeholder="1. Nefes egzersizi öğret&#10;2. Düşünce kaydı tut&#10;3. Veli görüşmesi yap" value={form.adimlar} onChange={e=>setForm(f=>({...f,adimlar:e.target.value}))} rows={4} style={{...inp,resize:"vertical",marginBottom:10}} />

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div>
                <label style={lbl}>SÜRE</label>
                <input placeholder="örn. 4 hafta" value={form.sure} onChange={e=>setForm(f=>({...f,sure:e.target.value}))} style={inp} />
              </div>
              <div>
                <label style={lbl}>ÖNCELİK</label>
                <select value={form.oncelik} onChange={e=>setForm(f=>({...f,oncelik:e.target.value}))} style={{...inp,height:38}}>
                  {["Yüksek","Orta","Düşük"].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            </div>

            <label style={lbl}>SORUMLU</label>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {[["pdr","PDR Danışmanı"],["aile","Aile"],["ogretmen","Öğretmen"],["ogrenci","Öğrenci"]].map(([k,l])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,sorumlu:k}))} style={{flex:1,padding:"6px 4px",fontSize:11,fontWeight:form.sorumlu===k?700:500,borderRadius:8,border:`2px solid ${form.sorumlu===k?ACCENT:BORDER}`,background:form.sorumlu===k?ACCENT_LIGHT:CARD,color:form.sorumlu===k?ACCENT:MUTED,cursor:"pointer"}}>{l}</button>
              ))}
            </div>

            <button onClick={handleKaydet} disabled={!form.hedef.trim()} style={{width:"100%",padding:"11px",background:form.hedef?ACCENT:BORDER,color:form.hedef?"#fff":MUTED,border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
              {kaydedildi?"✓ Kaydedildi!":"💾 Planı Kaydet"}
            </button>
          </div>

          {/* Mevcut planlar */}
          {ogrPlanlar.length > 0 && (
            <div>
              <div style={{fontSize:12,fontWeight:700,color:TEXT,marginBottom:10}}>Mevcut Planlar ({ogrPlanlar.length})</div>
              {ogrPlanlar.map(p => {
                const [rc,rbg] = durumRenk[p.durum]||["#888","#eee"];
                return (
                  <div key={p.id} style={{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`4px solid ${rc}`,borderRadius:10,padding:12,marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:TEXT,flex:1}}>{p.hedef}</div>
                      <span style={{background:rbg,color:rc,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700,flexShrink:0,marginLeft:8}}>{p.durum}</span>
                    </div>
                    <div style={{fontSize:11,color:MUTED,marginBottom:6}}>{p.tarih} · {p.sure} · {p.oncelik} öncelik</div>
                    {p.adimlar && <div style={{fontSize:12,color:TEXT,lineHeight:1.7,whiteSpace:"pre-wrap",background:"#f9f9f9",borderRadius:6,padding:"6px 8px",marginBottom:8}}>{p.adimlar}</div>}
                    <div style={{display:"flex",gap:6}}>
                      {["Devam Ediyor","Tamamlandı","Askıda"].map(d=>(
                        <button key={d} onClick={()=>handleDurumGuncelle(p.ogrenci,p.id,d)} style={{flex:1,padding:"5px",fontSize:10,fontWeight:p.durum===d?700:500,borderRadius:7,border:`1px solid ${p.durum===d?rc:BORDER}`,background:p.durum===d?rbg:CARD,color:p.durum===d?rc:MUTED,cursor:"pointer"}}>{d}</button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Sevk Takip Bileşeni ───────────────────────────────────────────────────────
function SevkTakipEkrani({ kayitliListesi, aktifOgrenci, sevkler, setSevkler }) {
  const [aramaMetni, setAramaMetni] = useState("");
  const [form, setForm] = useState({ studentName:"", className:"", sevkYeri:"RAM", sevkNedeni:"", tarih:today(), sonucBekleniyor:true, geri_bildirim:"" });
  const [gosterFiltre, setGosterFiltre] = useState("Tümü");

  useEffect(() => { if (aktifOgrenci?.name) setForm(f=>({...f, studentName:aktifOgrenci.name, className:aktifOgrenci.className||""})); }, [aktifOgrenci?.name]);

  const inp = { width:"100%", padding:"9px 11px", border:`1px solid ${BORDER}`, borderRadius:9, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:4, textTransform:"uppercase" };

  async function handleKaydet() {
    if (!form.studentName.trim() || !form.sevkNedeni.trim()) return;
    const yeni = { id: uid(), ...form };
    const updated = [yeni, ...sevkler];
    setSevkler(updated); await saveSevkler(updated);
    setForm({ studentName:"", className:"", sevkYeri:"RAM", sevkNedeni:"", tarih:today(), sonucBekleniyor:true, geri_bildirim:"" });
  }

  async function handleGuncelle(id, fields) {
    const updated = sevkler.map(s => s.id===id ? {...s, ...fields} : s);
    setSevkler(updated); await saveSevkler(updated);
  }

  const filtreli = sevkler.filter(s => {
    if (gosterFiltre === "Bekliyor") return s.sonucBekleniyor;
    if (gosterFiltre === "Tamamlandı") return !s.sonucBekleniyor;
    return true;
  }).filter(s => !aramaMetni || s.studentName?.toLowerCase().includes(aramaMetni.toLowerCase()));

  const sevkYerleri = ["RAM","Psikolog","Psikiyatrist","Özel Eğitim","Sosyal Hizmetler","Rehberlik Araştırma","Diğer"];

  return (
    <div>
      <div style={{background:"#FDF6E3",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#B07D1A",fontWeight:600}}>
        📤 Sevk Takibi — RAM, psikolog, psikiyatri ve diğer yönlendirmeler
      </div>

      {/* Yeni sevk formu */}
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:TEXT,marginBottom:10}}>Yeni Sevk Kaydı</div>

        {/* Öğrenci seç */}
        <label style={lbl}>ÖĞRENCİ</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
          {kayitliListesi.filter(o=>o.name.toLowerCase().includes(aramaMetni.toLowerCase())).slice(0,12).map(o=>{
            const s=form.studentName===o.name;
            return <button key={o.name} onClick={()=>setForm(f=>({...f,studentName:o.name,className:o.className||""}))} style={{padding:"4px 10px",borderRadius:16,border:`2px solid ${s?ACCENT:BORDER}`,background:s?ACCENT_LIGHT:CARD,color:s?ACCENT:MUTED,fontSize:11,fontWeight:s?700:500,cursor:"pointer"}}>{o.name}</button>;
          })}
        </div>
        <input placeholder="veya ad yaz..." value={form.studentName} onChange={e=>setForm(f=>({...f,studentName:e.target.value}))} style={{...inp,marginBottom:10}} />

        <label style={lbl}>SEVK YERİ</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {sevkYerleri.map(y=>(
