                  {/* D2 */}
                  <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                    <div style={{fontSize:12,fontWeight:700,color:PURPLE,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>D2 Dikkat Testi</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      {[{key:"TN",label:"TN"},{key:"E1",label:"E1"},{key:"E2",label:"E2"},{key:"CP",label:"CP"},{key:"FR",label:"FR"},{key:"PR",label:"PR"}].map(f=>(
                        <div key={f.key}>
                          <label style={{...lbl,color:PURPLE}}>{f.key}</label>
                          <input type="number" placeholder="—" value={prof2Form.d2?.[f.key]||""}
                            onChange={e=>{
                              const val=e.target.value;
                              setProf2Form(p=>{
                                const nd={...(p.d2||{}),[f.key]:val};
                                const tn=parseFloat(f.key==="TN"?val:nd.TN),e1=parseFloat(f.key==="E1"?val:nd.E1)||0,e2=parseFloat(f.key==="E2"?val:nd.E2)||0;
                                if(!isNaN(tn)&&tn>0){nd.TN_E=String(tn-e1-e2);nd.E_yuzde=(((e1+e2)/tn)*100).toFixed(2);}
                                return {...p,d2:nd};
                              });
                            }}
                            style={{...inp,borderColor:prof2Form.d2?.[f.key]?PURPLE:BORDER}} />
                        </div>
                      ))}
                    </div>
                    {(prof2Form.d2?.TN_E||prof2Form.d2?.E_yuzde) && (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                        {[{k:"TN_E",l:"TN-E (Test Performansı)"},{k:"E_yuzde",l:"E% (Hata Oranı)"}].map(f=>(
                          <div key={f.k} style={{background:"#F3F0FF",borderRadius:8,padding:"8px",textAlign:"center"}}>
                            <div style={{fontSize:18,fontWeight:900,color:PURPLE}}>{prof2Form.d2?.[f.k]||"—"}</div>
                            <div style={{fontSize:10,color:PURPLE,fontWeight:700}}>{f.l}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    {prof2Form.d2?.E_yuzde && (
                      <div style={{borderRadius:8,padding:"8px 12px",marginBottom:6,border:"2px solid",...(()=>{const e=parseFloat(prof2Form.d2.E_yuzde);return e<=1.5?{background:"#E6F5EE",borderColor:"#1A8C5B",color:"#1A8C5B"}:e<=2.5?{background:"#FDF6E3",borderColor:"#B07D1A",color:"#B07D1A"}:{background:"#FDECEA",borderColor:"#C0392B",color:"#C0392B"};})()}}>
                        <b>E = {prof2Form.d2.E_yuzde}%</b> → {(()=>{const e=parseFloat(prof2Form.d2.E_yuzde);return e<=1.5?"NORMAL (0–1.5)":e<=2.5?"DİKKAT EDİLMELİ (1.5–2.5)":"DİKKAT PROBLEMİ (2.5+)";})()}
                      </div>
                    )}
                    <label style={lbl}>DANIŞMAN YORUMU</label>
                    <textarea placeholder="D2 gözlemi…" value={prof2Form.d2?.yorum||""}
                      onChange={e=>setProf2Form(p=>({...p,d2:{...(p.d2||{}),yorum:e.target.value}}))}
                      rows={2} style={{...inp,resize:"vertical"}} />
                  </div>

                  {/* İlgi alanları */}
                  <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#92400E",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Kişisel Gelişim & İlgi Profili</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                      {ILGI_ETIKETLERI.map(ilgi=>{
                        const sec=(prof2Form.ilgiler||[]).includes(ilgi);
                        return <button key={ilgi} onClick={()=>setProf2Form(f=>({...f,ilgiler:sec?f.ilgiler.filter(x=>x!==ilgi):[...(f.ilgiler||[]),ilgi]}))} style={{padding:"4px 10px",borderRadius:16,border:`2px solid ${sec?"#92400E":BORDER}`,background:sec?"#FEF9C3":CARD,color:sec?"#92400E":MUTED,fontSize:12,fontWeight:sec?700:500,cursor:"pointer"}}>{ilgi}</button>;
                      })}
                    </div>
                    <label style={lbl}>KARİYER HEDEFİ</label>
                    <input placeholder="Olmak istediği meslek…" value={prof2Form.kariyer_hedef||""}
                      onChange={e=>setProf2Form(f=>({...f,kariyer_hedef:e.target.value}))} style={{...inp,marginBottom:8}} />
                    <label style={lbl}>AİLE NOTU</label>
                    <textarea placeholder="Aile tutumu, beklentiler…" value={prof2Form.aile_notu||""}
                      onChange={e=>setProf2Form(f=>({...f,aile_notu:e.target.value}))}
                      rows={2} style={{...inp,resize:"vertical"}} />
                  </div>

                  <button onClick={handleP2Analiz} disabled={prof2AiLoading} style={{
                    width:"100%",padding:"10px",background:prof2AiLoading?BORDER:BLUE,
                    color:prof2AiLoading?"#666":"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10
                  }}>{prof2AiLoading?"AI analiz yapıyor…":"✦ AI Akademik & D2 Analizi"}</button>

                  {prof2Analiz && (
                    <div style={{marginBottom:12}}>
                      <label style={lbl}>AKADEMİK & D2 ANALİZİ</label>
                      <textarea value={prof2Analiz} onChange={e=>setProf2Analiz(e.target.value)}
                        rows={7} style={{...inp,resize:"vertical",lineHeight:1.7,background:"#F3F0FF",borderColor:PURPLE}} />
                    </div>
                  )}
                </div>
              )}

              {/* Kaydet butonu */}
              <button onClick={handleKaydet} disabled={!seciliAd} style={{
                width:"100%",padding:"13px",background:seciliAd?ACCENT:BORDER,
                color:seciliAd?"#fff":MUTED,border:"none",borderRadius:12,fontSize:15,fontWeight:800,cursor:"pointer",marginTop:8
              }}>{kaydedildi?"✓ Kaydedildi — Önizleme Açıldı":"💾 Kaydet ve Önizle"}</button>
            </>
          )}

          {/* ── ÖNİZLEME MODU ──────────────────────────────────── */}
          {mod === "onizleme" && (
            <div>
              {/* Radar */}
              {mevcutP1 && (
                <div style={{
                  background: `linear-gradient(135deg, ${ACCENT}E6 0%, #164A35E6 100%)`,
                  backdropFilter: "blur(14px)", WebkitBackdropFilter: "blur(14px)",
                  border: "1px solid rgba(255,255,255,0.25)", borderRadius: 16, padding: 16, marginBottom: 12,
                  boxShadow: "0 8px 24px rgba(15,61,46,0.3)"
                }}>
                  <div style={{fontSize:12,fontWeight:700,color:"#fff",opacity:0.85,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>◈ PDR Profil Radar</div>
                  <div style={{display:"flex",justifyContent:"center"}}>
                    <RadarChart scores={mevcutP1.scores} size={240} glass />
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginTop:8}}>
                    {DIMENSIONS.map(d=>{
                      const val=mevcutP1.scores?.[d.key]||0;
                      return (
                        <div key={d.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:BG,borderRadius:6,padding:"4px 8px"}}>
                          <span style={{fontSize:11,color:TEXT}}>{d.label}</span>
                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <div style={{width:40,height:4,background:BORDER,borderRadius:2}}>
                              <div style={{width:`${(val/5)*100}%`,height:"100%",background:d.color,borderRadius:2}}/>
                            </div>
                            <span style={{fontSize:12,fontWeight:800,color:d.color}}>{val}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* PDR Analizi */}
              {mevcutP1?.analysis && (
                <div style={{background:"#F0FAF4",border:`1px solid ${ACCENT_LIGHT}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:ACCENT,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>AI PDR Analizi</div>
                  <div style={{fontSize:13,color:TEXT,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{mevcutP1.analysis}</div>
                </div>
              )}

              {/* Deneme */}
              {denemeGirilen.length > 0 && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:BLUE,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>LGS Deneme Sonuçları</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                    {denemeGirilen.map(d=>{
                      const c=d.toplam>=70?"#1A8C5B":d.toplam>=50?"#B07D1A":"#C0392B";
                      const bg=d.toplam>=70?"#E6F5EE":d.toplam>=50?"#FDF6E3":"#FDECEA";
                      return <div key={d.no} style={{background:bg,borderRadius:8,padding:"6px 10px",textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>D{d.no}</div><div style={{fontSize:16,fontWeight:900,color:c}}>{d.toplam.toFixed(1)}</div></div>;
                    })}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    {[["Ort",( denemeGirilen.reduce((s,d)=>s+d.toplam,0)/denemeGirilen.length).toFixed(1),ACCENT],["Max",Math.max(...denemeGirilen.map(d=>d.toplam)).toFixed(1),"#1A8C5B"],["Min",Math.min(...denemeGirilen.map(d=>d.toplam)).toFixed(1),"#C0392B"]].map(([l,v,c])=>(
                      <div key={l} style={{textAlign:"center",background:BG,borderRadius:8,padding:"6px"}}>
                        <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
                        <div style={{fontSize:10,color:MUTED}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* D2 Tablo + Grafik */}
              {mevcutP2?.d2 && (mevcutP2.d2.TN||mevcutP2.d2.TN_E) && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:PURPLE,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>D2 Dikkat Testi</div>
                  {/* Tablo */}
                  <div style={{overflowX:"auto",marginBottom:12}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:"#F3F0FF"}}>
                          {[["TN","Psikomotor Hız"],["E1","Seçici Dikkat"],["E2","Öğrenme Güçlüğü"],["CP","Doğru Perf."],["FR","Hız Salınımı"],["TN-E","Test Performansı"],["E%","Hata Oranı"],["PR","Yüzdelik"]].map(([k,ac])=>(
                            <th key={k} style={{padding:"6px 8px",textAlign:"center",color:PURPLE,fontWeight:700,fontSize:10,borderBottom:`2px solid ${PURPLE}22`}}>
                              <div>{k}</div><div style={{fontSize:8,color:MUTED,fontWeight:400}}>{ac}</div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          {[
                            mevcutP2.d2.TN, mevcutP2.d2.E1, mevcutP2.d2.E2,
                            mevcutP2.d2.CP, mevcutP2.d2.FR, mevcutP2.d2.TN_E,
                            mevcutP2.d2.E_yuzde ? mevcutP2.d2.E_yuzde+"%" : null,
                            mevcutP2.d2.PR
                          ].map((v,i)=>(
                            <td key={i} style={{padding:"8px",textAlign:"center",fontWeight:800,fontSize:16,color:PURPLE,borderBottom:`1px solid ${BORDER}`}}>
                              {v||"—"}
                            </td>
                          ))}
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  {/* Grafik — bar chart */}
                  {mevcutP2.d2.PR && (() => {
                    const pr = parseFloat(mevcutP2.d2.PR);
                    const e = parseFloat(mevcutP2.d2.E_yuzde)||0;
                    const bars = [
                      { label:"PR (Yüzdelik)", val:pr, max:100, color:pr>=85?"#1A8C5B":pr>=70?"#457B9D":pr>=60?"#B07D1A":"#C0392B", hedef:75 },
                      { label:"E% (Hata)", val:e, max:10, color:e<=1.5?"#1A8C5B":e<=2.5?"#B07D1A":"#C0392B", hedef:null, ters:true },
                    ];
                    return (
                      <div style={{marginBottom:12}}>
                        {bars.map(b=>(
                          <div key={b.label} style={{marginBottom:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                              <span style={{fontSize:11,fontWeight:600,color:TEXT}}>{b.label}</span>
                              <span style={{fontSize:13,fontWeight:900,color:b.color}}>{b.val}{b.label.includes("%")&&!String(b.val).includes("%")?"%":""}</span>
                            </div>
                            <div style={{height:12,background:BORDER,borderRadius:6,position:"relative",overflow:"hidden"}}>
                              <div style={{width:`${Math.min((b.val/b.max)*100,100)}%`,height:"100%",background:b.color,borderRadius:6,transition:"width .5s"}}/>
                              {b.hedef && <div style={{position:"absolute",top:0,left:`${b.hedef}%`,width:2,height:"100%",background:"#1A1A2E",opacity:0.5}}/>}
                            </div>
                            {b.hedef && <div style={{fontSize:9,color:MUTED,textAlign:"right"}}>Hedef ≥{b.hedef}</div>}
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                  {/* E% yorum */}
                  {mevcutP2.d2.E_yuzde && (
                    <div style={{borderRadius:8,padding:"8px 12px",marginBottom:8,border:"2px solid",...(()=>{const e=parseFloat(mevcutP2.d2.E_yuzde);return e<=1.5?{background:"#E6F5EE",borderColor:"#1A8C5B",color:"#1A8C5B"}:e<=2.5?{background:"#FDF6E3",borderColor:"#B07D1A",color:"#B07D1A"}:{background:"#FDECEA",borderColor:"#C0392B",color:"#C0392B"};})(),...{fontSize:12,fontWeight:700}}}>
                      E = {mevcutP2.d2.E_yuzde}% → {(()=>{const e=parseFloat(mevcutP2.d2.E_yuzde);return e<=1.5?"✓ NORMAL (0–1.5)":e<=2.5?"⚠ DİKKAT EDİLMELİ (1.5–2.5)":"✗ DİKKAT PROBLEMİ (2.5+)";})()}
                    </div>
                  )}
                  {mevcutP2.d2.yorum && <div style={{fontSize:12,color:MUTED,marginBottom:8}}>📝 {mevcutP2.d2.yorum}</div>}
                  {mevcutP2.d2_analiz && <div style={{fontSize:12,color:TEXT,background:"#EDE9FF",borderRadius:8,padding:10,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{mevcutP2.d2_analiz}</div>}
                </div>
              )}

              {/* Sınav puanları — 2 yazılı */}
              {mevcutP2?.sinavlar && Object.values(mevcutP2.sinavlar).some(v=>v!=="") && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:BLUE,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Yazılı Sınav Puanları</div>
                  {DERSLER.map(d=>{
                    const v1=parseFloat(mevcutP2.sinavlar?.[d.key+"1"]);
                    const v2=parseFloat(mevcutP2.sinavlar?.[d.key+"2"]);
                    const ort=!isNaN(v1)&&!isNaN(v2)?((v1+v2)/2).toFixed(1):!isNaN(v1)?v1:!isNaN(v2)?v2:null;
                    if(!ort) return null;
                    return (
                      <div key={d.key} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:600,color:TEXT}}>{d.label}</span>
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            {!isNaN(v1)&&<span style={{fontSize:11,color:MUTED}}>1.Yazılı: <b style={{color:d.color}}>{v1}</b></span>}
                            {!isNaN(v2)&&<span style={{fontSize:11,color:MUTED}}>2.Yazılı: <b style={{color:d.color}}>{v2}</b></span>}
                            <span style={{fontSize:13,fontWeight:900,color:d.color,background:d.color+"11",borderRadius:6,padding:"2px 8px"}}>Ort: {ort}</span>
                          </div>
                        </div>
                        <div style={{height:8,background:BG,borderRadius:4,display:"flex",gap:2}}>
                          {!isNaN(v1)&&<div style={{width:`${v1/2}%`,height:"100%",background:d.color,borderRadius:4,opacity:0.6}}/>}
                          {!isNaN(v2)&&<div style={{width:`${v2/2}%`,height:"100%",background:d.color,borderRadius:4}}/>}
                        </div>
                        <div style={{fontSize:9,color:MUTED,marginTop:2}}>Maks: 100 · Bar = yazılı puanları</div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* İlgi + Kariyer */}
              {mevcutP2 && (mevcutP2.ilgiler?.length>0 || mevcutP2.kariyer_hedef) && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  {mevcutP2.kariyer_hedef && <div style={{fontSize:13,marginBottom:8}}><b style={{color:ACCENT}}>Kariyer Hedefi:</b> {mevcutP2.kariyer_hedef}</div>}
                  {mevcutP2.ilgiler?.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {mevcutP2.ilgiler.map(i=><span key={i} style={{background:"#FEF9C3",color:"#92400E",borderRadius:12,padding:"2px 10px",fontSize:11,fontWeight:600}}>{i}</span>)}
                  </div>}
                </div>
              )}

              {/* Görüşme özeti */}
              {ogrRec.length > 0 && (
                <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Görüşme Geçmişi ({ogrRec.length})</div>
                  {ogrRec.slice(0,3).map(r=>(
                    <div key={r.id} style={{marginBottom:8,padding:8,background:BG,borderRadius:6,borderLeft:`3px solid ${ACCENT}`}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:3}}>{r.date} · {r.topic||"Genel"}</div>
                      <div style={{fontSize:12,color:TEXT,lineHeight:1.6}}>{r.summary}</div>
                    </div>
                  ))}
                  {ogrRec.length>3 && <div style={{fontSize:11,color:MUTED,textAlign:"center"}}>+{ogrRec.length-3} görüşme daha</div>}
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── Sınıf Profili Bileşeni ────────────────────────────────────────────────────
function SinifProfili({ ogrenciler, records, riskListesi, aktifYil }) {
  const [seciliSinif, setSeciliSinif] = useState(null);

  const SUBELER = ["8-A","8-B","8-C","8-D","8-E","8-F","8-G","8-H","8-I","8-J","8-K","8-L","8-M","8-N"];
  const RISK_TURLERI = ["Davranış","Akademik","Aile","Akran / Zorbalık","Duygusal","Devamsızlık","Öz Zarar","Sağlık","Madde Kullanımı","Ekonomik Güçlük","Yas / Kayıp","Travma","Özel Öğrenme Güçlüğü","Diğer"];

  // Yıl filtreli öğrenciler
  const yilOgrencileri = ogrenciler.filter(o => !o.yil || o.yil === aktifYil);

  // Her şube için istatistik
  function subeIstatistik(sube) {
    const ogr = yilOgrencileri.filter(o => (o.className||"").toUpperCase().replace(" ","") === sube.replace("-","").toUpperCase() ||
      (o.className||"").toUpperCase() === sube.toUpperCase());
    const ogrAdlar = ogr.map(o => o.studentName.toLowerCase().trim());
    const gorusmeler = records.filter(r => ogrAdlar.includes(r.studentName?.toLowerCase().trim()));
    const riskler = riskListesi.filter(r => ogrAdlar.includes(r.studentName?.toLowerCase().trim()) && !r.kapandi);
    const riskDagilim = {};
    RISK_TURLERI.forEach(t => {
      riskDagilim[t] = riskler.filter(r => r.riskTuru === t).length;
    });
    return { ogr, gorusmeler, riskler, riskDagilim };
  }

  // Aktif şubeler — öğrencisi olan ya da herhangi biri
  const aktifSubeler = SUBELER.filter(s => {
    const st = subeIstatistik(s);
    return st.ogr.length > 0;
  });
  const gosterilecekSubeler = aktifSubeler.length > 0 ? aktifSubeler : SUBELER;

  if (seciliSinif) {
    const st = subeIstatistik(seciliSinif);
    const enCokGorusulen = [...st.ogr].sort((a,b) => {
      const aG = records.filter(r => r.studentName?.toLowerCase().trim() === a.studentName.toLowerCase().trim()).length;
      const bG = records.filter(r => r.studentName?.toLowerCase().trim() === b.studentName.toLowerCase().trim()).length;
      return bG - aG;
    });

    return (
      <div>
        {/* Geri butonu */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={()=>setSeciliSinif(null)} style={{background:BG,border:`1px solid ${BORDER}`,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,color:MUTED,cursor:"pointer"}}>← Geri</button>
          <div style={{fontSize:18,fontWeight:900,color:TEXT}}>{seciliSinif} Sınıfı</div>
          <span style={{fontSize:12,color:MUTED}}>· {aktifYil}</span>
        </div>

        {/* Özet kartlar */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"Öğrenci",val:st.ogr.length,color:ACCENT},
            {label:"Görüşme",val:st.gorusmeler.length,color:BLUE},
            {label:"Aktif Risk",val:st.riskler.length,color:st.riskler.length>0?"#C0392B":MUTED},
          ].map(c=>(
            <div key={c.label} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:900,color:c.color}}>{c.val}</div>
              <div style={{fontSize:10,color:MUTED}}>{c.label}</div>
            </div>
          ))}
        </div>

        {/* Risk Haritası */}
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#C0392B",textTransform:"uppercase",marginBottom:10}}>⚠ Risk Haritası</div>
          {RISK_TURLERI.map(t => {
            const sayi = st.riskDagilim[t]||0;
            const ogrRisk = st.riskler.filter(r=>r.riskTuru===t);
            return (
              <div key={t} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:12,color:TEXT,fontWeight:sayi>0?700:400}}>{t}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {sayi > 0 && (
                      <div style={{display:"flex",gap:3}}>
                        {ogrRisk.map(r=>(
                          <span key={r.id} style={{background:"#FDECEA",color:"#C0392B",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>{r.studentName}</span>
                        ))}
                      </div>
                    )}
                    <span style={{fontSize:12,fontWeight:900,color:sayi>0?"#C0392B":MUTED,width:20,textAlign:"right"}}>{sayi||"—"}</span>
                  </div>
                </div>
                <div style={{height:4,background:BORDER,borderRadius:2}}>
                  <div style={{width:`${st.ogr.length>0?Math.min(100,(sayi/st.ogr.length)*100*3):0}%`,height:"100%",background:sayi>0?"#C0392B":BORDER,borderRadius:2}}/>
                </div>
              </div>
            );
          })}
          {st.riskler.length === 0 && (
            <div style={{textAlign:"center",color:"#1A8C5B",fontSize:12,padding:"8px 0"}}>✓ Aktif risk kaydı yok</div>
          )}
        </div>

        {/* Öğrenci Listesi */}
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14}}>
          <div style={{fontSize:12,fontWeight:700,color:TEXT,textTransform:"uppercase",marginBottom:10}}>Öğrenci Listesi</div>
          {enCokGorusulen.length === 0 && (
            <div style={{textAlign:"center",color:MUTED,fontSize:12}}>Bu sınıfta kayıtlı öğrenci yok</div>
          )}
          {enCokGorusulen.map(o => {
            const gSayisi = records.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim()).length;
            const oRisk = riskListesi.filter(r => r.studentName?.toLowerCase().trim() === o.studentName.toLowerCase().trim() && !r.kapandi);
            return (
              <div key={o.studentName} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BORDER}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:ACCENT_LIGHT,color:ACCENT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800}}>
                    {o.studentName.charAt(0).toUpperCase()}
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:TEXT}}>{o.studentName}</div>
                    {o.numara && <div style={{fontSize:10,color:MUTED}}>No: {o.numara}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  {oRisk.length > 0 && <span style={{background:"#FDECEA",color:"#C0392B",borderRadius:10,padding:"2px 7px",fontSize:10,fontWeight:700}}>⚠ Risk</span>}
                  <span style={{background:ACCENT_LIGHT,color:ACCENT,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>{gSayisi} görüşme</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // Ana ekran — şube kartları
  return (
    <div>
      <div style={{background:"#EEF2FF",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:BLUE,fontWeight:600}}>
        🏫 {aktifYil} — Sınıf & Şube Haritası
      </div>

      {/* Şube kartları grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {SUBELER.map(sube => {
          const st = subeIstatistik(sube);
          const riskVar = st.riskler.length > 0;
          const gorusmeli = st.gorusmeler.length > 0;
          return (
            <div key={sube} onClick={()=>setSeciliSinif(sube)} style={{
              background:CARD, border:`2px solid ${riskVar?"#F28B82":gorusmeli?ACCENT_LIGHT:BORDER}`,
              borderRadius:14, padding:"14px 12px", cursor:"pointer",
              transition:"all 0.15s"
            }}>
              {/* Şube adı */}
              <div style={{fontSize:22,fontWeight:900,color:riskVar?"#C0392B":gorusmeli?ACCENT:MUTED,marginBottom:6}}>{sube}</div>

              {/* İstatistikler */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                <span style={{background:ACCENT_LIGHT,color:ACCENT,borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                  👤 {st.ogr.length} öğrenci
                </span>
                {gorusmeli && (
                  <span style={{background:"#EEF2FF",color:BLUE,borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                    💬 {st.gorusmeler.length} görüşme
                  </span>
                )}
                {riskVar && (
                  <span style={{background:"#FDECEA",color:"#C0392B",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                    ⚠ {st.riskler.length} risk
                  </span>
                )}
              </div>

              {/* Risk türleri mini */}
              {riskVar && (
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {RISK_TURLERI.filter(t=>st.riskDagilim[t]>0).map(t=>(
                    <span key={t} style={{background:"#FDECEA",color:"#C0392B",borderRadius:8,padding:"1px 6px",fontSize:9,fontWeight:700}}>
                      {t}: {st.riskDagilim[t]}
                    </span>
                  ))}
                </div>
              )}

              {!gorusmeli && st.ogr.length === 0 && (
                <div style={{fontSize:10,color:MUTED}}>Kayıt yok</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ── Kütüphane Ekle Bileşeni ───────────────────────────────────────────────────
function KutuphaneEkle({ kutuphane, setKutuphane }) {
  const [mod, setMod] = useState("dosya");
  const [yeniBaslik, setYeniBaslik] = useState("");
  const [yeniMetin, setYeniMetin] = useState("");
  const [yeniLink, setYeniLink] = useState("");
  const [yukleniyor, setYukleniyor] = useState(false);

  const stl = { width:"100%", padding:"9px 11px", border:`1px solid ${BORDER}`, borderRadius:9, fontSize:13, background:CARD, color:TEXT, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:600, color:MUTED, display:"block", marginBottom:4, textTransform:"uppercase" };

  async function aiOzetle(metin, baslik) {
    const res = await pdrCallClaude({
        model:"claude-sonnet-4-6", max_tokens:800,
        system:"Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT (otomatik dusunceler, sema teorisi, maruz birakma), baglanma teorisi (Bowlby), aile sistemleri (Minuchin), gelisim psikolojisi (Erikson, Vygotsky), Bourdieu sosyolojisi, Frankl anlam terapisi ve Stoa felsefesi perspektifinden degerlendirir; somut, uygulanabilir PDR onerileri sunarsın. Yargilamayan, guclu yonlere odaklanan, Turkce yazan bir klinisyensin. Verilen metni su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR (BDT, baglanma, sosyoloji, felsefe) 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
        messages:[{role:"user", content:`Başlık: ${baslik||"Belirtilmemiş"}\n\nMetin:\n${metin.substring(0,8000)}`}]
      });
    const data = await res.json();
    return data.content?.[0]?.text || metin.substring(0,400);
  }

  async function kaydet(ozet, baslik, kaynak) {
    const yeni = {id:uid(), baslik:baslik||"İsimsiz Kaynak", dosyaAdi:kaynak, ozet, tarih:today()};
    const updated = [yeni, ...kutuphane];
    setKutuphane(updated);
    await saveKutuphane(updated);
    setYeniBaslik(""); setYeniMetin(""); setYeniLink("");
  }

  async function handleDosya(file) {
    if (!file) return;
    setYukleniyor(true);
    try {
      const baslik = yeniBaslik || file.name.replace(/\.pdf$/i,"");
      if (file.type === "application/pdf") {
        const b64 = await new Promise((res,rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const resp = await pdrCallClaude({
            model:"claude-sonnet-4-6", max_tokens:800,
            system:"Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip, okul psikolojik danismanligi alaninda uzmanlasmis bir psikolog ve PDR uzmanisin. Bilissel Davranisci Terapi (BDT) temel yonelimindir: otomatik dusunceler, bilissel carpitmalar, sema teorisi, davranissal aktivasyon ve maruz birakma tekniklerini klinik pratikte ustaca kullanirsin. Baglanma teorisi (Bowlby, Ainsworth), aile sistemleri terapisi (Minuchin, Bowen) ve gelisim psikolojisi (Piaget, Vygotsky, Erikson) perspektifinden bireyi cevresiyle birlikte degerlendirirsin. Sosyolojide Bourdieu'nun habitus ve kulturel sermaye kavramlari, Giddens'in yapilasmasi ve sosyal tabakalasmanin psikolojik etkilerini Turkiye baglaminda okursun: aile baskisi, toplumsal cinsiyet rolleri, sinav odakli egitimin cocuk uzerindeki yukunu sosyolojik zemine oturtursun. Felsefi temetin: Frankl anlam terapisi, Sartre sorumluluk etigi, Stoa kontrol alani, fenomenolojinin oznel deneyim odagi. Uslubun: yargilamayan, merak eden, guclu yonlere odaklanan, somut ve uygulanabilir oneriler sunan, Turkce yazan, PDR diline hakim bir klinisyen. Verilen icerigi su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR (BDT, baglanma, sosyoloji, felsefe perspektifinden) 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
            messages:[{role:"user", content:[
              {type:"document", source:{type:"base64", media_type:"application/pdf", data:b64}},
              {type:"text", text:`Bu belgeyi PDR perspektifinden özetle. Başlık: ${baslik}`}
            ]}]
          });
        const data = await resp.json();
        const ozet = data.content?.[0]?.text || "Özet alınamadı.";
        await kaydet(ozet, baslik, file.name);
      } else {
        const metin = await file.text();
        const ozet = await aiOzetle(metin, baslik);
        await kaydet(ozet, baslik, file.name);
      }
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }

  async function handleLink() {
    if (!yeniLink.trim()) return;
    setYukleniyor(true);
    try {
      const baslik = yeniBaslik || yeniLink;

      // 1. Sayfayı fetch et
      let sayfaIcerigi = "";
      try {
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(yeniLink);
        const fetchResp = await fetch(proxyUrl);
        const fetchData = await fetchResp.json();
        const html = fetchData.contents || "";
        const div = document.createElement("div");
        div.innerHTML = html;
        div.querySelectorAll("script,style,nav,footer,header").forEach(el => el.remove());
        sayfaIcerigi = (div.innerText || div.textContent || "").replace(/\s+/g, " ").trim().substring(0, 8000);
      } catch { sayfaIcerigi = ""; }

      const mesaj = sayfaIcerigi
        ? "Bu web sayfası içeriğini PDR perspektifinden özetle.\nURL: " + yeniLink + "\n\nİÇERİK:\n" + sayfaIcerigi
        : "Bu web sayfasının içeriğini PDR perspektifinden özetle: " + yeniLink;

      const bodyObj = {
        model: "claude-sonnet-4-6", max_tokens: 800,
        system: "Sen Dr. Ayse Kara'sin - 20 yillik klinik deneyime sahip PDR uzmani ve psikologsun. BDT, baglanma teorisi, gelisim psikolojisi, Bourdieu sosyolojisi ve Frankl felsefesi perspektifinden kaynaklari analiz edersin. Verilen icerigi su yapida ozet: 1. ANA TEMALAR 2. PDR/KLINIK ACISINDAN ONEMLI NOKTALAR 3. ANAHTAR KAVRAMLAR. Max 350 kelime. Sade yaz. Markdown kullanma.",
        messages: [{ role: "user", content: mesaj }]
      };
      if (!sayfaIcerigi) bodyObj.tools = [{ type: "web_search_20250305", name: "web_search" }];

      const resp = await pdrCallClaude(bodyObj);
      const data = await resp.json();
      const ozet = data.content?.find(b => b.type === "text")?.text || "İçerik okunamadı.";
      await kaydet(ozet, baslik, yeniLink);
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }
  async function handleMetin() {
    if (!yeniMetin.trim()) return;
    setYukleniyor(true);
    try {
      const ozet = await aiOzetle(yeniMetin, yeniBaslik);
      await kaydet(ozet, yeniBaslik, "metin");
    } catch(e) { alert("Hata: " + e.message); }
    setYukleniyor(false);
  }

  return (
    <div style={{background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:16, marginBottom:16}}>
      <div style={{fontSize:12, fontWeight:700, color:TEXT, marginBottom:12}}>Kaynak Ekle</div>
      <div style={{display:"flex", gap:6, marginBottom:14}}>
        {[["dosya","📄 Dosya"],["link","🔗 Link"],["metin","📝 Metin"]].map(([k,l]) => (
          <button key={k} onClick={() => setMod(k)} style={{
            flex:1, padding:"8px 4px", borderRadius:8,
            border:`2px solid ${mod===k ? ACCENT : BORDER}`,
            background:mod===k ? ACCENT_LIGHT : CARD,
            color:mod===k ? ACCENT : MUTED,
            fontSize:11, fontWeight:700, cursor:"pointer"
          }}>{l}</button>
        ))}
      </div>
      <label style={lbl}>BAŞLIK (isteğe bağlı)</label>
      <input placeholder="örn. Bağlanma Teorisi — Bowlby" value={yeniBaslik}
        onChange={e => setYeniBaslik(e.target.value)} style={{...stl, marginBottom:12}} />

        {yukleniyor ? (
          <div style={{color:MUTED, fontSize:13, padding:20, textAlign:"center"}}>⏳ AI okuyor ve özetliyor… (30-60 sn)</div>
        ) : (
          <div style={{textAlign:"center"}}>
            <div style={{border:`2px dashed ${BORDER}`, borderRadius:10, padding:24, background:BG}}
              onDragOver={e => { e.preventDefault(); e.stopPropagation(); }}
              onDrop={e => { e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) handleDosya(f); }}
            >
              <div style={{fontSize:36, marginBottom:8}}>📄</div>
              <div style={{fontSize:13, color:TEXT, fontWeight:600, marginBottom:12}}>PDF veya metin dosyası</div>
              <div style={{ position:"relative", display:"inline-block" }}>
                <div style={{
                  background:ACCENT, color:"#fff",
                  borderRadius:10, padding:"11px 28px", fontSize:14, fontWeight:700,
                  pointerEvents:"none"
                }}>
                  📂 Dosya Seç
                </div>
                <input type="file" accept=".pdf,.txt,.doc,application/pdf,text/plain"
                  style={{
                    position:"absolute", top:0, left:0, width:"100%", height:"100%",
                    opacity:0, cursor:"pointer", fontSize:16, margin:0, padding:0
                  }}
                  onChange={e => { const f=e.target.files?.[0]; if(f){handleDosya(f); e.target.value="";} }} />
              </div>
              <div style={{fontSize:11, color:MUTED, marginTop:10}}>PDF, TXT · Bilgisayarda sürükle bırak da çalışır</div>
            </div>
          </div>
        )}



      {mod === "link" && (
        <>
          <label style={lbl}>MAKALE / WEB SAYFASI LİNKİ</label>
          <input placeholder="https://…" value={yeniLink}
            onChange={e => setYeniLink(e.target.value)} style={{...stl, marginBottom:10}} />
          <button onClick={handleLink} disabled={!yeniLink.trim() || yukleniyor} style={{
            width:"100%", padding:"10px", border:"none", borderRadius:10,
            background:yeniLink.trim() && !yukleniyor ? ACCENT : BORDER,
            color:yeniLink.trim() && !yukleniyor ? "#fff" : MUTED,
            fontSize:13, fontWeight:700, cursor:"pointer"
          }}>{yukleniyor ? "⏳ İçerik okunuyor…" : "✦ AI Özetleyerek Kaydet"}</button>
        </>
      )}

      {mod === "metin" && (
        <>
          <label style={lbl}>METİN (yapıştırın)</label>
          <textarea placeholder="Kitap bölümü, makale veya notlarınızı yapıştırın…"
            value={yeniMetin} onChange={e => setYeniMetin(e.target.value)}
            rows={6} style={{...stl, resize:"vertical", lineHeight:1.6, marginBottom:10}} />
          <button onClick={handleMetin} disabled={!yeniMetin.trim() || yukleniyor} style={{
            width:"100%", padding:"10px", border:"none", borderRadius:10,
            background:yeniMetin.trim() && !yukleniyor ? ACCENT : BORDER,
            color:yeniMetin.trim() && !yukleniyor ? "#fff" : MUTED,
            fontSize:13, fontWeight:700, cursor:"pointer"
          }}>{yukleniyor ? "⏳ AI özetliyor…" : "✦ AI Özetleyerek Kaydet"}</button>
        </>
      )}
    </div>
  );
}
// ── Badge / StatBar ───────────────────────────────────────────────────────────
function Badge({ label, type }) {
  const color = type === "Veli" ? ORANGE : ACCENT;
  const bg = type === "Veli" ? "#FDEBD0" : ACCENT_LIGHT;
  return <span style={{ background: bg, color, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>;
}
function StatBar({ label, value, max, color = ACCENT }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 13, color: TEXT }}>{label}</span>
        <span style={{ fontSize: 13, fontWeight: 700, color }}>{value}</span>
      </div>
      <div style={{ height: 6, background: BORDER, borderRadius: 4 }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4 }} />
      </div>
    </div>
  );
}

function RecordCard({ rec, onDelete, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [duzenle, setDuzenle] = useState(false);
  const [editForm, setEditForm] = useState({ summary: rec.summary, topic: rec.topic || "", raw: rec.raw || "" });
  const [aiLoading, setAiLoading] = useState(false);
  const [kaydedildi, setKaydedildi] = useState(false);
  const isVeli = rec.meetingType === "Veli";

  async function handleAiRewrite() {
    if (!editForm.raw.trim()) return;
    setAiLoading(true);
    const summary = await getAISummary(editForm.raw);
    setEditForm(f => ({ ...f, summary }));
    setAiLoading(false);
  }

  function handleSave() {

                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: TEXT, marginBottom: 2 }}>📄 {k.baslik}</div>
                      <div style={{ fontSize: 11, color: MUTED }}>{k.tarih} · {k.dosyaAdi}</div>
                    </div>
                    <button onClick={() => handleKutuphaneDelete(k.id)} style={{
                      background: "none", border: "1px solid #F28B82", color: "#C5221F",
                      borderRadius: 8, padding: "3px 10px", fontSize: 11, cursor: "pointer", flexShrink: 0
                    }}>Sil</button>
                  </div>
                </div>
                <div style={{ padding: "12px 16px", fontSize: 12, color: TEXT, lineHeight: 1.7, whiteSpace: "pre-wrap", background: "#FAFDF7" }}>
                  {k.ozet}
                </div>
              </div>
            ))}

            {kutuphane.length > 0 && (
              <div style={{ background: ACCENT_LIGHT, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: ACCENT, fontWeight: 600, marginTop: 8 }}>
                ✓ Bu {kutuphane.length} kaynak, Profil 1 AI analizi yapılırken otomatik referans alınacak.
              </div>
            )}
          </div>
        )}

        {/* ── İSTATİSTİK ───────────────────────────────────────────── */}
        {tab === "veli_mektubu" && (
          <VeliMektubu
            kayitliListesi={kayitliListesi}
            aktifOgrenci={aktifOgrenci}
            records={records}
          />
        )}

        {tab === "istatistik" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
              {[
                { label: "Toplam Görüşme", value: totalRecs, color: ACCENT },
                { label: "Öğrenci Görüşmesi", value: studentRecs.length, color: ACCENT },
                { label: "Veli Görüşmesi", value: veliRecs.length, color: ORANGE },
                { label: "Farklı Öğrenci", value: uniqueStudents, color: BLUE },
                { label: "Profil Kaydı", value: profiles.length, color: PURPLE },
              ].map(c => (
                <div key={c.label} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: c.color }}>{c.value}</div>
                  <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>{c.label}</div>
                </div>
              ))}
            </div>
            {topTopics.length > 0 && (
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 14 }}>Konulara Göre</div>
                {topTopics.map(([topic, count]) => <StatBar key={topic} label={topic} value={count} max={maxTopic} color={ACCENT} />)}
              </div>
            )}
            {Object.keys(monthCount).length > 0 && (
              <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: ACCENT, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 14 }}>Aylara Göre</div>
                {Object.entries(monthCount).map(([month, count]) => <StatBar key={month} label={month} value={count} max={maxMonth} color={BLUE} />)}
              </div>
            )}
            {totalRecs === 0 && <div style={{ textAlign: "center", color: MUTED, marginTop: 40, fontSize: 14 }}><div style={{ fontSize: 36, marginBottom: 8 }}>📊</div>Henüz kayıt yok.</div>}
            <button onClick={() => exportToExcel(records)} disabled={totalRecs === 0} style={{
              width: "100%", padding: 13, background: totalRecs > 0 ? ACCENT : BORDER,
              color: totalRecs > 0 ? "#fff" : MUTED, border: "none", borderRadius: 12, fontSize: 15, fontWeight: 800, cursor: totalRecs > 0 ? "pointer" : "default"
            }}>⬇ Excel'e Aktar</button>
          </div>
        )}
        {tab === "ayarlar" && <AyarlarEkrani />}
      </div>
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "10px 12px", border: `1px solid ${BORDER}`,
  borderRadius: 10, fontSize: 14, background: CARD, color: TEXT,
  outline: "none", boxSizing: "border-box", fontFamily: "inherit"
};
const labelStyle = { fontSize: 11, fontWeight: 600, color: MUTED, display: "block", marginBottom: 4 };

const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
window.__pdrAuthReady.then(() => {
  root.render(React.createElement(App));
  setTimeout(()=>{const s=document.getElementById("splash");if(s)s.className="hide";},800);
});
</script>

</body>
</html>
